<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  html,body{width:100%;height:100%;margin:0;overflow:hidden}
  body{
    display:flex;align-items:center;justify-content:center;
    background:#E7E9ED;
    font-family:Pretendard,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .phone{

    background:linear-gradient(180deg,#EEF0F6 0%,#ECEEF5 100%);

    box-shadow:0 26px 64px -22px rgba(70,74,100,.38);
    display:flex;flex-direction:column;color:#3A3A50;
  }
  .nav-item{transition:transform .16s ease,color .16s ease,opacity .16s ease;text-decoration:none}
  .nav-item:hover{transform:translateY(-1px)}
  .nav-item:active{transform:translateY(0) scale(.98)}
</style>
</head>
<body>
<div class="phone">

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 6l-6 6 6 6" stroke="#8187A4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </a>
      <div style="padding-top:18px">

        <p style="margin:0;font:500 14px/1.55 Pretendard;color:#7A7F97">힘들 때, 이 순서대로 하나씩</p>
      </div>
    </div>

      </div>

      <div style="background:#fff;border-radius:24px;padding:16px 16px 16px 14px;display:flex;align-items:flex-start;gap:12px;box-shadow:0 12px 30px -22px rgba(68,72,100,.55);">
        <div style="width:38px;height:38px;border-radius:13px;background:#6D78B3;color:#fff;font:700 18px/1 Pretendard;display:flex;align-items:center;justify-content:center;flex:none">3</div>

  </div>

  <div style="display:flex;justify-content:space-around;align-items:center;padding:12px 16px 8px;background:rgba(255,255,255,.72);backdrop-filter:blur(10px);border-top:1px solid #E9E5F2">
    <a class="nav-item" href="../home/home.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:inherit">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 11L12 4l8 7v9H4z" stroke="#C6B4D4" stroke-width="1.8" stroke-linejoin="round"/><path d="M9 20v-6h6v6" fill="#C6B4D4" opacity=".2"/></svg>
      <span style="font:600 10px Pretendard;color:#C6B4D4">홈</span>
    </a>
    <a class="nav-item" href="../record/emotion.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:inherit">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M6 5h9a2 2 0 0 1 2 2v12H8a2 2 0 0 0-2 2z" stroke="#C6B4D4" stroke-width="1.7" stroke-linejoin="round"/></svg>

    <a class="nav-item" href="./home.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;color:inherit">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="#6E82AA"><path d="M12 20C5 15 4 9 7.5 7.5S12 9 12 9s1-2.6 4.5-1.5S19 15 12 20z" fill="#6E82AA" opacity=".2"/><path d="M12 20C5 15 4 9 7.5 7.5S12 9 12 9s1-2.6 4.5-1.5S19 15 12 20z" stroke="#6E82AA" stroke-width="1.7" fill="none" stroke-linejoin="round"/></svg>
