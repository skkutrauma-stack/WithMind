<!DOCTYPE html>
<html>
<head>

<style>
  body{
    margin:0;
    background:#DED6CE;
    font-family:Pretendard,system-ui,sans-serif;

    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px;
  }
</style>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</helmet>
<div style="width:390px;height:844px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);background:radial-gradient(120% 45% at 30% 0%,#E7DFFF,#FDF3FF 52%);color:#4A3550">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 30px 4px;font:600 15px Pretendard"><span>9:41</span><div style="display:flex;gap:7px;align-items:center"><svg width="18" height="12" viewBox="0 0 18 12" fill="#4A3550"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/><rect x="15" y="0" width="3" height="12" rx="1" opacity=".3"/></svg><svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3" fill="none" stroke="#4A3550" stroke-opacity=".4"/><rect x="3" y="3" width="15" height="7" rx="1.5" fill="#4A3550"/></svg></div></div>
  <div style="padding:16px 30px 6px;display:flex;align-items:center;gap:8px"><button onClick="location.href='./welcome.html'" style="border:none;background:none;padding:0;cursor:pointer;display:flex;align-items:center"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#9A7FAD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div style="flex:1;display:flex;gap:6px"><div style="flex:1;height:8px;border-radius:4px;background:#A98BE8"></div><div style="flex:1;height:8px;border-radius:4px;background:#E4D5F2"></div><div style="flex:1;height:8px;border-radius:4px;background:#E4D5F2"></div></div><span style="font:400 15px Jua,Pretendard;color:#A98BE8">1/3</span></div>
  <div style="flex:1;padding:28px 30px 26px;display:flex;flex-direction:column">
    <h1 style="margin:0 0 8px;font:400 30px Jua,Pretendard;color:#4A3550">계정 만들기</h1>
    <p style="margin:0 0 30px;font:500 14px Pretendard;color:#9A7FAD">1 / 3 · 로그인에 필요한 정보를 적어줘</p>
    <label style="font:600 12px Pretendard;color:#A98BE8;margin-bottom:8px">이메일</label>
    <input id="account-email" placeholder="you@email.com" style="display:block;width:100%;box-sizing:border-box;border:none;outline:none;background:#fff;border-radius:18px;padding:16px 17px;margin-bottom:16px;box-shadow:0 8px 20px -16px rgba(140,100,200,.5);font:500 15px Pretendard;color:#4A3550" />
    <label style="font:600 12px Pretendard;color:#A98BE8;margin-bottom:8px">비밀번호 <span style="color:#CFC0DE;font-weight:500">· 8자 이상</span></label>
    <input type="password" placeholder="12345678" style="display:block;width:100%;box-sizing:border-box;border:none;outline:none;background:#fff;border-radius:18px;padding:16px 17px;margin-bottom:16px;box-shadow:0 8px 20px -16px rgba(140,100,200,.5);font:500 15px Pretendard;color:#4A3550" />
    <label style="font:600 12px Pretendard;color:#A98BE8;margin-bottom:8px">이름</label>
    <input id="account-name" placeholder="봄봄" style="display:block;width:100%;box-sizing:border-box;border:none;outline:none;background:#fff;border-radius:18px;padding:16px 17px;margin-bottom:16px;box-shadow:0 8px 20px -16px rgba(140,100,200,.5);font:500 15px Pretendard;color:#4A3550" />
    <div style="display:block;width:100%;box-sizing:border-box;background:#F3E9FB;border-radius:16px;padding:14px 16px;font:500 12px/1.5 Pretendard;color:#8A72B8">이 정보는 로그인에만 쓰여요. 홈 화면에서는 <b style="color:#7A63C8">이름</b>으로 불러올게요.</div>
    <div style="flex:1"></div>
    <button id="account-next" type="button" style="display:block;border:none;width:100%;box-sizing:border-box;background:linear-gradient(90deg,#A98BE8,#7FA8F0);color:#fff;font:400 21px Jua,Pretendard;padding:16px 0;margin-top:14px;border-radius:22px;cursor:pointer;box-shadow:0 14px 28px -12px rgba(120,100,220,.8)">다음</button>
  </div>
</div>
<script>
  const emailInput = document.getElementById('account-email');
  const nextButton = document.getElementById('account-next');
  const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

  nextButton.addEventListener('click', () => {
    if (!emailPattern.test(emailInput.value.trim())) {
      alert('이메일 형식을 올바르게 입력해 주세요.');
      emailInput.focus();
      return;
    }

    location.href = './agreement.html';
  });
</script>
</x-dc>
</body>
</html>
