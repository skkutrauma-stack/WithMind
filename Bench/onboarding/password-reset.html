<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
<style>
  * { box-sizing: border-box; }
  [hidden] { display: none !important; }
  body { margin:0;background:#DED6CE;font-family:Pretendard,system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center; }
  .screen { width:390px;height:844px;border-radius:46px;overflow:hidden;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);background:radial-gradient(120% 50% at 80% 4%,#FFD9E4,#FDF3FF 55%);color:#4A3550;display:flex;flex-direction:column; }
  .content { flex:1;padding:24px 30px 30px;display:flex;flex-direction:column; }
  .field { width:100%;border:none;outline:none;background:#fff;border-radius:20px;padding:16px 17px;box-shadow:0 8px 20px -16px rgba(140,100,200,.5);font:500 15px Pretendard;color:#4A3550;margin-bottom:14px; }
  .primary-btn { border:none;width:100%;background:linear-gradient(90deg,#A98BE8,#7FA8F0);color:#fff;font:400 20px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:pointer;box-shadow:0 14px 28px -12px rgba(120,100,220,.8); }
  .primary-btn:disabled { opacity:.65;cursor:wait; }
  .status { min-height:52px;margin:16px 0 0;padding:12px 14px;border-radius:15px;background:#F3E9FB;color:#7A63C8;font:600 12px/1.5 Pretendard; }
  .status:empty { visibility:hidden; }
  .status.is-visible, .status[data-error="true"] { visibility:visible;color:#D85B66;background:#FFF0F2; }
  .login-link { color:#A98BE8;font-weight:700;text-decoration:none; }
</style>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</helmet>
<div class="screen">
  <div aria-hidden="true" style="height:35px;flex:none"></div>
  <div class="content">
    <button type="button" onClick="location.href='./login.html'" aria-label="로그인으로 돌아가기" style="align-self:flex-start;border:none;background:none;padding:0;cursor:pointer">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#9A7FAD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div style="height:72px"></div>
    <h1 style="margin:0 0 10px;font:400 32px Jua,Pretendard;color:#4A3550">비밀번호를 다시 설정해요</h1>
    <p style="margin:0 0 32px;font:500 14px/1.6 Pretendard;color:#9A7FAD">가입한 이메일로 재설정 링크를 보내드릴게요.</p>

    <section data-reset-request>
      <label style="display:block;font:600 12px Pretendard;color:#A98BE8;margin-bottom:8px">가입 이메일</label>
      <input class="field reset-email" type="email" autocomplete="email" placeholder="you@email.com">
      <button class="primary-btn reset-request-btn" type="button">재설정 메일 보내기</button>
    </section>

    <section data-reset-update hidden>
      <label style="display:block;font:600 12px Pretendard;color:#A98BE8;margin-bottom:8px">새 비밀번호 · 8자 이상</label>
      <input class="field reset-password" type="password" autocomplete="new-password" placeholder="새 비밀번호">
      <label style="display:block;font:600 12px Pretendard;color:#A98BE8;margin:4px 0 8px">새 비밀번호 확인</label>
      <input class="field reset-confirm" type="password" autocomplete="new-password" placeholder="새 비밀번호 확인">
      <button class="primary-btn reset-update-btn" type="button">비밀번호 변경하기</button>
    </section>

    <p class="status" data-reset-status data-form-error aria-live="polite"></p>
    <div style="flex:1"></div>
    <p style="text-align:center;font:500 13px Pretendard;color:#9A7FAD">비밀번호가 기억났어? <a class="login-link" href="./login.html">로그인</a></p>
  </div>
</div>
</x-dc>
<script type="module" src="../js/entry.js"></script>
</body>
</html>
