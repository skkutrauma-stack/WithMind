<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: #DED6CE;
    font-family: Pretendard, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }
  .screen {
    width: 390px;
    height: 844px;
    border-radius: 46px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 26px 64px -22px rgba(120,70,120,.4);
    background: radial-gradient(120% 50% at 80% 4%,#FFD9E4,#FDF3FF 55%);
    color: #4A3550;
    display: flex;
    flex-direction: column;
  }
  .content {
    flex: 1;
    padding: 40px 30px 26px;
    display: flex;
    flex-direction: column;
    position: relative;
    min-height: 0;
  }
  .field {
    width: 100%;
    border: none;
    outline: none;
    background: #fff;
    border-radius: 20px;
    padding: 16px 17px;
    box-shadow: 0 8px 20px -16px rgba(140,100,200,.5);
    font: 500 15px Pretendard;
    color: #4A3550;
    display: block;
  }
</style>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</helmet>
<div class="screen">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 30px 4px;font:600 15px Pretendard">
    <span>9:41</span>
    <div style="display:flex;gap:7px;align-items:center">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="#4A3550"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/></svg>
      <svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3" fill="none" stroke="#4A3550" stroke-opacity=".4"/><rect x="3" y="3" width="15" height="7" rx="1.5" fill="#4A3550"/></svg>
    </div>
  </div>

  <div style="padding:16px 30px 6px;display:flex;align-items:center;gap:8px">
    <button onClick="location.href='./landing.html'" style="border:none;background:none;padding:0;cursor:pointer;display:flex;align-items:center">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#9A7FAD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div class="content">
    <div style="align-self:flex-start;margin:10px 0 6px">
      <svg width="72" height="84" viewBox="0 0 130 150" fill="none">
        <ellipse cx="65" cy="142" rx="40" ry="7" fill="#E8CFDD" opacity=".5"/>
        <rect x="52" y="54" width="26" height="80" rx="13" fill="#E3B486"/>
        <ellipse cx="65" cy="46" rx="31" ry="35" fill="#FF8A6B"/>
        <ellipse cx="54" cy="32" rx="8" ry="10" fill="#fff" opacity=".4"/>
        <circle cx="56" cy="47" r="3.6" fill="#4A3550"/>
        <circle cx="76" cy="47" r="3.6" fill="#4A3550"/>
        <path d="M56 58q4.5 5 9 0t9 0" stroke="#4A3550" stroke-width="2.6" fill="none" stroke-linecap="round"/>
        <ellipse cx="47" cy="55" rx="5.5" ry="3.2" fill="#FF3E6E" opacity=".3"/>
        <ellipse cx="83" cy="55" rx="5.5" ry="3.2" fill="#FF3E6E" opacity=".3"/>
      </svg>
    </div>

    <h1 style="margin:14px 0 10px;font:400 34px/1.15 Jua,Pretendard;color:#4A3550">다시 만나요</h1>
    <p style="margin:0 0 34px;font:500 15px Pretendard;color:#9A7FAD">오늘도 마음이 힘든 순간을 기억해요</p>

    <input class="field" placeholder="you@email.com" style="margin-bottom:14px">
    <input class="field" type="password" placeholder="12345678" style="margin-bottom:10px">

    <a href="#" style="align-self:flex-end;font:600 12px Pretendard;color:#9A7FAD;text-decoration:none;margin-bottom:28px">비밀번호를 잊었어? <b style="color:#A98BE8">찾기</b></a>

    <button onClick="location.href='../home/home.html'" style="border:none;width:100%;background:linear-gradient(90deg,#A98BE8,#7FA8F0);color:#fff;font:400 21px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:pointer;box-shadow:0 14px 28px -12px rgba(120,100,220,.8);display:flex;align-items:center;justify-content:center;gap:8px">로그인
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div style="flex:1"></div>
    <p style="text-align:center;font:500 13px Pretendard;color:#9A7FAD">처음이야? <a href="./account.html" style="color:#A98BE8;font-weight:700;text-decoration:none">가입하기</a></p>
  </div>

  <div style="display:flex;justify-content:center;padding:8px 0 12px;position:relative">
    <div style="width:130px;height:5px;border-radius:3px;background:#4A3550;opacity:.16"></div>
  </div>
</div>
</x-dc>
</body>
</html>
