<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
<style>
  body{margin:0;background:#DED6CE;font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:0}
  .alarm-item{transition:transform .16s ease, box-shadow .16s ease, filter .16s ease, background-color .16s ease}
  .alarm-item:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 18px 34px -18px rgba(130,90,210,.45);filter:saturate(1.04)}
  .alarm-item:active{transform:translateY(0) scale(.99);box-shadow:0 10px 22px -18px rgba(130,90,210,.32)}
  .start-btn{transition:transform .16s ease, box-shadow .16s ease, filter .16s ease}
  .start-btn:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 18px 34px -14px rgba(160,110,180,.95);filter:saturate(1.06)}
  .start-btn:active{transform:translateY(0) scale(.99);box-shadow:0 12px 24px -14px rgba(160,110,180,.8)}
  .switch{width:48px;height:28px;border-radius:16px;position:relative;flex:none;cursor:pointer;border:none;padding:0;transition:background .2s ease, box-shadow .2s ease}
  .switch > span{position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .2s ease, right .2s ease}
  .switch[data-on="true"]{background:#A98BE8;box-shadow:inset 0 0 0 1px rgba(255,255,255,.12)}
  .switch[data-on="true"] > span{right:3px}
  .switch[data-on="false"]{background:#E4D5F2}
  .switch[data-on="false"] > span{left:3px}
</style>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</helmet>
<div style="width:390px;height:844px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);background:radial-gradient(120% 45% at 60% 0%,#DFF0FB,#FDF3FF 55%);color:#4A3550">
  <div aria-hidden="true" style="height:35px;flex:none"></div>
  <div style="flex:1;padding:14px 26px 24px;display:flex;flex-direction:column;gap:16px">
    <div style="display:inline-flex;align-items:center;gap:7px;align-self:flex-start;background:#DFF5EE;padding:8px 14px;border-radius:22px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 7 2 7H4s2-2 2-7z" stroke="#3E9E86" stroke-width="1.7" stroke-linejoin="round"/><path d="M10 20a2 2 0 0 0 4 0" stroke="#3E9E86" stroke-width="1.7"/></svg><span style="font:700 12px Pretendard;color:#3E9E86">마지막 단계야</span></div>
    <div><h1 style="margin:0 0 8px;font:400 30px Jua,Pretendard;color:#4A3550">언제 만날까?</h1><p style="margin:0;font:500 14px Pretendard;color:#9A7FAD">하루를 정리하기 좋은 시간에 알려줄게</p></div>

    <button class="alarm-item" data-on="true" style="border:none;background:#fff;border-radius:24px;padding:18px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 12px 28px -20px rgba(140,100,200,.6);text-align:left;cursor:pointer">
      <div style="width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,#A98BE8,#7FA8F0);display:flex;align-items:center;justify-content:center;flex:none"><svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M20 13a8 8 0 1 1-9-9 6.5 6.5 0 0 0 9 9z"/></svg></div>
      <div style="flex:1"><p class="alarm-label" style="margin:0 0 3px;font:400 18px Jua,Pretendard">저녁 9시</p><p style="margin:0;font:500 12px Pretendard;color:#9A7FAD">하루 마무리 체크인</p></div>
      <div class="switch" data-on="true" aria-label="저녁 9시 알림"><span></span></div>
    </button>

    <button class="alarm-item" data-on="false" style="border:none;background:#fff;border-radius:24px;padding:18px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 12px 28px -20px rgba(140,100,200,.6);text-align:left;cursor:pointer">
      <div style="width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,#FFC46B,#FF9E7A);display:flex;align-items:center;justify-content:center;flex:none"><svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5L19 19M19 5l-1.5 1.5M6.5 17.5L5 19" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></div>
      <div style="flex:1"><p class="alarm-label" style="margin:0 0 3px;font:400 18px Jua,Pretendard">점심 12시</p><p style="margin:0;font:500 12px Pretendard;color:#9A7FAD">가벼운 기분 체크</p></div>
      <div class="switch" data-on="false" aria-label="점심 12시 알림"><span></span></div>
    </button>

    <div id="notice" style="background:#EAF6FF;border-radius:16px;padding:14px 16px;font:500 12px/1.5 Pretendard;color:#5E8AA6">알림 문구엔 감정 얘기가 드러나지 않아. <b style="color:#2E6E96">잠금화면도 안심해.</b></div>
    <div style="flex:1"></div>
    <button class="start-btn" onClick="location.href='./landing.html'" style="border:none;width:100%;background:linear-gradient(90deg,#A98BE8,#FF8A6B);color:#fff;font:400 21px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:pointer;box-shadow:0 14px 28px -12px rgba(160,110,180,.8)">시작하기</button>
  </div>

</div>
</x-dc>
<script>
  const items = Array.from(document.querySelectorAll('.alarm-item'));
  const notice = document.getElementById('notice');

  function renderNotice(){
    const enabled = items.some(item => item.dataset.on === 'true');
    notice.innerHTML = enabled
      ? '알림 문구엔 감정 얘기가 드러나지 않아. <b style="color:#2E6E96">잠금화면도 안심해.</b>'
      : '알림이 꺼져 있어. <b style="color:#2E6E96">원할 때 다시 켤 수 있어.</b>';
    notice.style.background = enabled ? '#EAF6FF' : '#F3E9FB';
    notice.style.color = enabled ? '#5E8AA6' : '#7A63C8';
  }

  function syncItem(item){
    const on = item.dataset.on === 'true';
    const switchEl = item.querySelector('.switch');
    switchEl.dataset.on = String(on);
    item.querySelector('.alarm-label').style.opacity = on ? '1' : '.45';
    item.style.boxShadow = on ? '0 12px 28px -20px rgba(140,100,200,.6)' : '0 12px 28px -22px rgba(90,90,120,.35)';
  }

  items.forEach(item => {
    item.addEventListener('click', () => {
      item.dataset.on = String(item.dataset.on !== 'true');
      syncItem(item);
      renderNotice();
    });
    syncItem(item);
  });

  renderNotice();
</script>
<script type="module" src="../js/entry.js"></script>
</body>
</html>
