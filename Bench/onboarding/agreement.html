<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
</head>
<body>
<x-dc><helmet data-dc-atomics>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>body{margin:0;background:radial-gradient(120% 45% at 50% 0%,#F0E3FB,#FDF3FF 52%);font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}.agree-item,.start-btn{transition:transform .16s ease,box-shadow .16s ease,filter .16s ease,border-color .16s ease}.agree-item:hover,.start-btn:hover{transform:translateY(-2px) scale(1.016);filter:brightness(1.03);box-shadow:0 18px 34px -18px rgba(120,90,180,.55)}.agree-item:active,.start-btn:active{transform:translateY(0) scale(.995);filter:brightness(.98)}</style>
</helmet>
<div style="width:390px;height:844px;border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);background:radial-gradient(120% 45% at 50% 0%,#F0E3FB,#FDF3FF 52%);color:#4A3550">
  <div aria-hidden="true" style="height:35px;flex:none"></div>
  <div style="padding:14px 30px 6px;display:flex;align-items:center;gap:8px"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#9A7FAD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><div style="flex:1;display:flex;gap:6px"><div style="flex:1;height:8px;border-radius:4px;background:#A98BE8"></div><div style="flex:1;height:8px;border-radius:4px;background:#A98BE8"></div><div style="flex:1;height:8px;border-radius:4px;background:#A98BE8"></div></div><span style="font:400 15px Jua,Pretendard;color:#A98BE8">3/3</span></div>
  <div style="flex:1;padding:14px 26px 26px;display:flex;flex-direction:column">
    <h1 style="margin:0 0 8px;font:400 27px/1.3 Jua,Pretendard;color:#4A3550">마지막으로,<br>동의가 필요해</h1>
    <p style="margin:0 0 22px;font:500 14px Pretendard;color:#9A7FAD">3 / 3 · 너의 기록을 안전하게 지키기 위해</p>

    <div id="checks" style="display:flex;flex-direction:column;gap:11px">
      <button type="button" class="agree-item" data-active="false" style="background:#fff;border:2px solid #E9E0F5;border-radius:20px;padding:15px 16px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 10px 24px -18px rgba(140,100,200,.5);cursor:pointer;text-align:left;position:relative">
        <div class="box" style="width:26px;height:26px;border-radius:9px;border:2px solid #D9CBE8;flex:none;box-sizing:border-box;display:flex;align-items:center;justify-content:center;overflow:hidden;line-height:0"></div>
        <div><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><p style="margin:0;font:400 16px Jua,Pretendard">서비스 이용약관</p><span style="font:700 9px Pretendard;color:#7A63C8;background:#EBE1FB;padding:2px 7px;border-radius:7px">필수</span></div><p style="margin:0;font:500 11px Pretendard;color:#9A7FAD">앱 이용에 대한 기본 약속이야</p></div>
      </button>
      <button type="button" class="agree-item" data-active="false" style="background:#fff;border:2px solid #E9E0F5;border-radius:20px;padding:15px 16px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 10px 24px -18px rgba(140,100,200,.5);cursor:pointer;text-align:left;position:relative">
        <div class="box" style="width:26px;height:26px;border-radius:9px;border:2px solid #D9CBE8;flex:none;box-sizing:border-box;display:flex;align-items:center;justify-content:center;overflow:hidden;line-height:0"></div>
        <div><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><p style="margin:0;font:400 16px Jua,Pretendard">개인정보 수집·이용</p><span style="font:700 9px Pretendard;color:#7A63C8;background:#EBE1FB;padding:2px 7px;border-radius:7px">필수</span></div><p style="margin:0;font:500 11px Pretendard;color:#9A7FAD">계정과 기록을 안전히 보관해</p></div>
      </button>
      <button type="button" class="agree-item" data-active="false" style="background:#fff;border:2px solid #E9E0F5;border-radius:20px;padding:15px 16px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 10px 24px -18px rgba(140,100,200,.5);cursor:pointer;text-align:left;position:relative">
        <div class="box" style="width:26px;height:26px;border-radius:9px;border:2px solid #D9CBE8;flex:none;box-sizing:border-box;display:flex;align-items:center;justify-content:center;overflow:hidden;line-height:0"></div>
        <div><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><p style="margin:0;font:400 16px Jua,Pretendard">민감정보 처리</p><span style="font:700 9px Pretendard;color:#7A63C8;background:#EBE1FB;padding:2px 7px;border-radius:7px">필수</span></div><p style="margin:0;font:500 11px Pretendard;color:#9A7FAD">감정 기록은 민감정보로 특별 보호돼</p></div>
      </button>
      <button type="button" class="agree-item" data-active="false" style="background:#fff;border:2px solid #E9E0F5;border-radius:20px;padding:15px 16px;display:flex;gap:12px;align-items:flex-start;box-shadow:0 10px 24px -18px rgba(140,100,200,.5);cursor:pointer;text-align:left;position:relative">
        <div class="box" style="width:26px;height:26px;border-radius:9px;border:2px solid #D9CBE8;flex:none;box-sizing:border-box;display:flex;align-items:center;justify-content:center;overflow:hidden;line-height:0"></div>
        <div><div style="display:flex;align-items:center;gap:6px;margin-bottom:2px"><p style="margin:0;font:400 16px Jua,Pretendard">연구 목적 데이터 활용</p><span style="font:700 9px Pretendard;color:#7A63C8;background:#EBE1FB;padding:2px 7px;border-radius:7px">필수</span></div><p style="margin:0;font:500 11px Pretendard;color:#9A7FAD">익명 통계로 더 나은 도움을 연구해</p></div>
      </button>
    </div>

    <div style="flex:1"></div>
    <button id="startBtn" class="start-btn" type="button" disabled style="border:none;width:100%;background:linear-gradient(90deg,#C8BBDB,#C7D3EA);color:#fff;opacity:.75;font:400 20px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:not-allowed;box-shadow:0 14px 28px -12px rgba(120,100,220,.35);margin-top:16px">동의하고 시작하기</button>
  </div>

</div>
<script>
  const items = [...document.querySelectorAll('.agree-item')];
  const startBtn = document.getElementById('startBtn');
  function syncButton() {
    const allChecked = items.every((item) => item.dataset.active === 'true');
    startBtn.disabled = !allChecked;
    startBtn.style.opacity = allChecked ? '1' : '.75';
    startBtn.style.cursor = allChecked ? 'pointer' : 'not-allowed';
    startBtn.style.background = allChecked
      ? 'linear-gradient(90deg,#A98BE8,#7FA8F0)'
      : 'linear-gradient(90deg,#C8BBDB,#C7D3EA)';
  }
  items.forEach((item) => item.addEventListener('click', () => {
    const active = item.dataset.active === 'true';
    item.dataset.active = String(!active);
    const box = item.querySelector('.box');
    if (!box) return;
    if (!active) {
      item.style.border = '2px solid #A98BE8';
      item.style.background = '#fff';
      box.style.background = 'linear-gradient(135deg,#A98BE8,#7FA8F0)';
      box.style.border = 'none';
      box.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 12.2l3.6 3.6L18 7.4" stroke="#fff" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    } else {
      item.style.border = '2px solid #E9E0F5';
      item.style.background = '#fff';
      box.style.background = 'transparent';
      box.style.border = '2px solid #D9CBE8';
      box.innerHTML = '';
    }
    syncButton();
  }));
  startBtn.addEventListener('click', () => {
    if (startBtn.disabled) return;
    location.href = './baseline_assessment.html';
  });
  syncButton();
</script>
<script type="module" src="../js/entry.js"></script>
</x-dc></body>
</html>
