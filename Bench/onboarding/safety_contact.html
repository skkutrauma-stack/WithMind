<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: radial-gradient(120% 45% at 20% 0%, #E7DFFF, #FDF3FF 55%);
    font-family: Pretendard, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    
    display: flex;
    align-items: center;
    justify-content: center;
    
  }
  .screen {
    width: 390px;
    height: 844px;
    border-radius: 46px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 26px 64px -22px rgba(70,80,110,.4);
    background: linear-gradient(180deg,#EEF1F7,#F5F3F9);
    color: #39384A;
    display: flex;
    flex-direction: column;
  }
  .content {
    flex: 1;
    padding: 14px 26px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 0;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    padding: 16px;
    box-shadow: 0 8px 22px -18px rgba(70,80,110,.5);
  }
  .field {
    width: 100%;
    border: none;
    outline: none;
    background: #F1F2F8;
    border-radius: 14px;
    padding: 13px 14px;
    resize: none;
    font: 500 13px Pretendard;
    color: #4A3550;
    display: block;
  }
  .back-btn, .primary-btn, .ghost-btn { transition: transform .16s ease, box-shadow .16s ease, filter .16s ease, opacity .16s ease; }  .back-btn:hover, .primary-btn:hover, .ghost-btn:hover { transform: translateY(-2px) scale(1.016); filter: brightness(1.03); box-shadow: 0 18px 34px -18px rgba(120,90,180,.55); }  .back-btn:active, .primary-btn:active, .ghost-btn:active { transform: translateY(0) scale(.995); filter: brightness(.98); }</style>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</helmet>
<div class="screen">
  <div aria-hidden="true" style="height:35px;flex:none"></div>

  <div style="padding:16px 30px 6px;display:flex;align-items:center;gap:8px">
    <button class="back-btn" onClick="location.href='./baseline_assessment.html'" style="border:none;background:none;padding:0;cursor:pointer;display:flex;align-items:center">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#9A7FAD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div style="flex:1;display:flex;gap:6px">
      <div style="flex:1;height:8px;border-radius:4px;background:#A98BE8"></div>
      <div style="flex:1;height:8px;border-radius:4px;background:#A98BE8"></div>
      <div style="flex:1;height:8px;border-radius:4px;background:#A98BE8"></div>
    </div>
    <span style="font:400 15px Jua,Pretendard;color:#A98BE8">3/3</span>
  </div>

  <div class="content">
    <div style="display:inline-flex;align-items:center;gap:7px;align-self:flex-start;background:#E2E4F0;padding:8px 14px;border-radius:22px">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3l7 3v6c0 4-3 7-7 9-4-2-7-5-7-9V6z" stroke="#6E76A8" stroke-width="1.8" stroke-linejoin="round"/></svg>
      <span style="font:700 12px Pretendard;color:#6E76A8">나만의 안전 계획</span>
    </div>

    <div>
      <h1 style="margin:0 0 8px;font:400 25px/1.35 Jua,Pretendard;color:#39384A">힘들어질 때,<br>미리 준비해두자</h1>
      <p style="margin:0;font:500 13px/1.5 Pretendard;color:#7B7C93">기억해두면, 위급할 때 이 화면이 먼저 나타나</p>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#C99A57" stroke-width="1.7"/><path d="M12 8v5M12 16h.01" stroke="#C99A57" stroke-width="2" stroke-linecap="round"/></svg>
        <span style="font:700 13px Pretendard">마음이 힘들어질 때 신호</span>
      </div>
      <textarea class="field" style="min-height:70px" placeholder="예) 잠이 안 오고 자꾸 눈물이 나"></textarea>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 21C7 17 4 13 4 9a4 4 0 0 1 8-1 4 4 0 0 1 8 1c0 4-3 8-8 12z" stroke="#6E9E88" stroke-width="1.7" stroke-linejoin="round"/></svg>
        <span style="font:700 13px Pretendard">나를 진정시키는 방법</span>
      </div>
      <textarea class="field" style="min-height:70px" placeholder="예) 이불 속에서 좋아하는 노래 듣기"></textarea>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="#6E76A8" stroke-width="1.7"/><path d="M5 20c1-4 4-6 7-6s6 2 7 6" stroke="#6E76A8" stroke-width="1.7" stroke-linecap="round"/></svg>
        <span style="font:700 13px Pretendard">연락할 사람</span>
      </div>
      <input class="field" placeholder="예) 언니 · 010-0000-0000">
    </div>

    <div style="flex:1"></div>

    <button class="primary-btn" onClick="location.href='./alert.html'" style="border:none;width:100%;background:#6E76A8;color:#fff;font:400 20px Jua,Pretendard;padding:16px 0;border-radius:20px;cursor:pointer;box-shadow:0 10px 26px -14px rgba(110,118,168,.8)">저장하고 계속</button>
    <button class="ghost-btn" onClick="location.href='./alert.html'" style="border:none;background:none;color:#8A8CA0;font:600 13px Pretendard;padding:6px 0;cursor:pointer">나중에 채울게요</button>
  </div>
  </div>
</div>
</x-dc>
</body>
</html>
