<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<style>
  * { box-sizing: border-box; }
  .gender {
    flex: 1;
    text-align: center;
    border: none;
    border-radius: 14px;
    padding: 12px 0;
    font: 400 15px Jua,Pretendard;
    cursor: pointer;
  }
  .gender[data-active="true"] {
    background: linear-gradient(90deg,#A98BE8,#7FA8F0);
    color: #fff;
    box-shadow: 0 8px 18px -12px rgba(120,100,220,.45);
  }
  .gender[data-active="false"] {
    background: #F3E9FB;
    color: #9A7FAD;
  }
  .gender, .birth-trigger, .region-trigger, .next-btn {
    transition: transform .16s ease, box-shadow .16s ease, filter .16s ease, background .16s ease, color .16s ease;
  }
  .gender:hover, .birth-trigger:hover, .region-trigger:hover, .next-btn:hover, .back-btn:hover {
    transform: translateY(-2px);
    filter: brightness(1.03);
    box-shadow: 0 16px 28px -18px rgba(120,90,180,.45);
  }
  .gender:active, .birth-trigger:active, .region-trigger:active, .next-btn:active, .back-btn:active {
    transform: translateY(0) scale(.995);
    filter: brightness(.99);
  }
  body {
    margin: 0;
    background: #DED6CE;
    font-family: Pretendard, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 0;
  }
  .screen {
    width: 390px;
    height: 844px;
    border-radius: 46px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 26px 64px -22px rgba(120,70,120,.4);
    background: radial-gradient(120% 45% at 70% 0%,#DDEEFB,#FDF3FF 52%);
    color: #4A3550;
    display: flex;
    flex-direction: column;
  }
  .content {
    flex: 1;
    padding: 14px 30px 26px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .field {
    width: 100%;
    border: none;
    outline: none;
    background: #fff;
    border-radius: 18px;
    padding: 14px 16px;
    box-shadow: 0 8px 20px -16px rgba(140,100,200,.5);
    font: 500 15px Pretendard;
    color: #4A3550;
    display: block;
  }
  .birth-group {
    position: relative;
    flex: 1;
    min-width: 0;
  }
  .birth-trigger {
    width: 100%;
    border: none;
    outline: none;
    background: #fff;
    border-radius: 18px;
    padding: 14px 16px;
    box-shadow: 0 8px 20px -16px rgba(140,100,200,.5);
    font: 500 15px Pretendard;
    color: #4A3550;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .birth-trigger::after {
    content: "";
    width: 7px;
    height: 7px;
    border-right: 2px solid #A98BE8;
    border-bottom: 2px solid #A98BE8;
    transform: rotate(45deg) translateY(-2px);
    flex:none;
    transition: transform .16s ease;
  }
  .birth-group[data-open="true"] .birth-trigger::after {
    transform: rotate(-135deg) translateY(2px);
  }
  .birth-menu {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(100% + 8px);
    background: rgba(255,255,255,.98);
    border-radius: 18px;
    box-shadow: 0 18px 34px -20px rgba(120,90,180,.45);
    border: 1px solid rgba(224,210,242,.8);
    padding: 8px;
    display: none;
    z-index: 20;
    max-height: 240px;
    overflow: auto;
  }
  .birth-group[data-open="true"] .birth-menu { display: block; }
  .birth-option {
    width: 100%;
    border: none;
    background: transparent;
    border-radius: 14px;
    padding: 11px 12px;
    text-align: left;
    font: 500 14px Pretendard;
    color: #4A3550;
    cursor: pointer;
  }
  .birth-option:hover { background: #F3E9FB; color: #7A63C8; transform: translateX(2px); }
  .region-group {
    position: relative;
    margin-bottom: 16px;
  }
  .region-trigger {
    width: 100%;
    border: none;
    outline: none;
    background: #fff;
    border-radius: 18px;
    padding: 14px 16px;
    box-shadow: 0 8px 20px -16px rgba(140,100,200,.5);
    font: 500 15px Pretendard;
    color: #4A3550;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .region-trigger::after {
    content: "";
    width: 7px;
    height: 7px;
    border-right: 2px solid #A98BE8;
    border-bottom: 2px solid #A98BE8;
    transform: rotate(45deg) translateY(-2px);
    flex:none;
    transition: transform .16s ease;
  }
  .region-group[data-open="true"] .region-trigger::after {
    transform: rotate(-135deg) translateY(2px);
  }
  .region-menu {
    position: absolute;
    left: 0;
    right: 0;
    top: calc(100% + 8px);
    background: rgba(255,255,255,.98);
    border-radius: 18px;
    box-shadow: 0 18px 34px -20px rgba(120,90,180,.45);
    border: 1px solid rgba(224,210,242,.8);
    padding: 8px;
    display: none;
    z-index: 20;
    max-height: 240px;
    overflow: auto;
  }
  .region-group[data-open="true"] .region-menu { display: block; }
  .region-option {
    width: 100%;
    border: none;
    background: transparent;
    border-radius: 14px;
    padding: 11px 12px;
    text-align: left;
    font: 500 14px Pretendard;
    color: #4A3550;
    cursor: pointer;
  }
  .region-option:hover { background: #F3E9FB; color: #7A63C8; transform: translateX(2px); }
</style>
</head>
<body>
<x-dc>

        <div class="birth-menu" role="listbox" aria-label="생일 목록">

          <button class="birth-option" type="button" data-value="06">06</button>
          <button class="birth-option" type="button" data-value="07">07</button>

        <button class="region-option" type="button" data-value="충청남도">충청남도</button>
        <button class="region-option" type="button" data-value="전북특별자치도">전북특별자치도</button>

<script>
  const g = [...document.querySelectorAll('.gender')];
  g.forEach((b, i) => b.addEventListener('click', () => g.forEach((x, j) => x.dataset.active = String(i === j))));

  const birthGroups = [...document.querySelectorAll('.birth-group')];
  const closeAllBirthMenus = () => birthGroups.forEach((group) => group.dataset.open = 'false');

  birthGroups.forEach((group) => {
    const trigger = group.querySelector('.birth-trigger');
    const display = group.querySelector('.birth-display');
    const options = [...group.querySelectorAll('.birth-option')];
    trigger.addEventListener('click', (event) => {
      event.stopPropagation();
      const willOpen = group.dataset.open !== 'true';
      closeAllBirthMenus();
      group.dataset.open = String(willOpen);
    });
    options.forEach((option) => {
      option.addEventListener('click', (event) => {
        event.stopPropagation();
        const value = option.dataset.value || '';
        display.textContent = value || (group.dataset.key === 'year' ? '년' : group.dataset.key === 'month' ? '월' : '일');
        group.dataset.open = 'false';
      });
    });
  });

  const regionGroup = document.querySelector('.region-group');
  if (regionGroup) {
    const regionTrigger = regionGroup.querySelector('.region-trigger');
    const regionDisplay = regionGroup.querySelector('.region-display');
    const regionOptions = [...regionGroup.querySelectorAll('.region-option')];
    regionTrigger.addEventListener('click', (event) => {
      event.stopPropagation();
      regionGroup.dataset.open = String(regionGroup.dataset.open !== 'true');
    });
    regionOptions.forEach((option) => {
      option.addEventListener('click', (event) => {
        event.stopPropagation();
        regionDisplay.textContent = option.dataset.value || '지역';
        regionGroup.dataset.open = 'false';
      });
    });
  }
  document.addEventListener('click', () => {
    closeAllBirthMenus();
    if (regionGroup) regionGroup.dataset.open = 'false';
  });
</script>
</x-dc>
</body>
</html>
