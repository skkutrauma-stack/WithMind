<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
<style>
  * { box-sizing: border-box; }
  .gender {
    flex: 1;
    text-align: center;
    border: none;
    border-radius: 14px;
    padding: 12px 0;
    font: 400 15px Jua,Pretendard;
    cursor: pointer;
  }
  .gender[data-active="true"] {
    background: linear-gradient(90deg,#A98BE8,#7FA8F0);
    color: #fff;
    box-shadow: 0 8px 18px -12px rgba(120,100,220,.45);
  }
  .gender[data-active="false"] {
    background: #F3E9FB;
    color: #9A7FAD;
  }
  body {
    margin: 0;
    background: #DED6CE;
    font-family: Pretendard, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px;
  }
  .screen {
    width: 390px;
    height: 844px;
    border-radius: 46px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 26px 64px -22px rgba(120,70,120,.4);
    background: radial-gradient(120% 45% at 70% 0%,#DDEEFB,#FDF3FF 52%);
    color: #4A3550;
    display: flex;
    flex-direction: column;
  }
  .content {
    flex: 1;
    padding: 28px 30px 26px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .field {
    width: 100%;
    border: none;
    outline: none;
    background: #fff;
    border-radius: 18px;
    padding: 14px 16px;
    box-shadow: 0 8px 20px -16px rgba(140,100,200,.5);
    font: 500 15px Pretendard;
    color: #4A3550;
    display: block;
  }
</style>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
</helmet>
<div class="screen">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 30px 4px;font:600 15px Pretendard">
    <span>9:41</span>
    <div style="display:flex;gap:7px;align-items:center">
      <svg width="18" height="12" viewBox="0 0 18 12" fill="#4A3550"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/></svg>
      <svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3" fill="none" stroke="#4A3550" stroke-opacity=".4"/><rect x="3" y="3" width="15" height="7" rx="1.5" fill="#4A3550"/></svg>
    </div>
  </div>

  <div style="padding:16px 30px 6px;display:flex;align-items:center;gap:8px">
    <button onClick="location.href='./account.html'" style="border:none;background:none;padding:0;cursor:pointer;display:flex;align-items:center">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#9A7FAD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div style="flex:1;display:flex;gap:6px">
      <div style="flex:1;height:8px;border-radius:4px;background:#A98BE8"></div>
      <div style="flex:1;height:8px;border-radius:4px;background:#A98BE8"></div>
      <div style="flex:1;height:8px;border-radius:4px;background:#E4D5F2"></div>
    </div>
    <span style="font:400 15px Jua,Pretendard;color:#A98BE8">2/3</span>
  </div>

  <div class="content">
    <h1 style="margin:0 0 8px;font:400 30px Jua,Pretendard;color:#4A3550">나에 대해 알려줘</h1>
    <p style="margin:0 0 28px;font:500 14px Pretendard;color:#9A7FAD">2 / 3 · 맞춤 분석을 위한 정보예요</p>

    <label style="font:600 12px Pretendard;color:#A98BE8;margin-bottom:10px">성별</label>
    <div style="display:flex;gap:8px;margin-bottom:22px">
      <button class="gender" data-active="true" type="button">남성</button>
      <button class="gender" data-active="false" type="button">여성</button>
      <button class="gender" data-active="false" type="button">비공개</button>
    </div>

    <label style="font:600 12px Pretendard;color:#A98BE8;margin-bottom:10px">생년월일</label>
    <div style="display:flex;gap:8px;margin-bottom:22px">
      <input class="field" placeholder="1995">
      <input class="field" placeholder="05">
      <input class="field" placeholder="24">
    </div>

    <label style="font:600 12px Pretendard;color:#A98BE8;margin-bottom:10px">사는 곳</label>
    <input class="field" placeholder="지역을 입력해줘" style="margin-bottom:16px">

    <div style="flex:1"></div>
    <button onClick="location.href='./alert.html'" style="border:none;width:100%;background:linear-gradient(90deg,#A98BE8,#7FA8F0);color:#fff;font:400 21px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:pointer;box-shadow:0 14px 28px -12px rgba(120,100,220,.8)">다음</button>
  </div>

  <div style="display:flex;justify-content:center;padding:8px 0 12px">
    <div style="width:130px;height:5px;border-radius:3px;background:#4A3550;opacity:.16"></div>
  </div>
</div>
<script>
  const g = [...document.querySelectorAll('.gender')];
  g.forEach((b, i) => b.addEventListener('click', () => g.forEach((x, j) => x.dataset.active = String(i === j))));
</script>
</x-dc>
</body>
</html>
