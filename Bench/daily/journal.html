<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet"><style>html,body{margin:0;width:100%;height:100%;font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#f8f2ff;overflow:hidden}body{display:flex;justify-content:center;align-items:center;box-sizing:border-box}.back{transition:transform .14s ease,box-shadow .14s ease,filter .14s ease}.back:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 10px 18px -8px rgba(140,100,200,.7);filter:saturate(1.05)}.back:active{transform:translateY(0) scale(.98);box-shadow:0 6px 12px -8px rgba(140,100,200,.55)}.check-item{transition:transform .18s ease,box-shadow .18s ease,filter .18s ease,border-color .18s ease}.check-item:hover{transform:translateY(-2px);box-shadow:0 14px 30px -18px rgba(140,100,200,.66);filter:saturate(1.03)}.check-item:active{transform:translateY(0) scale(.99)}.journal-card{transition:transform .18s ease,box-shadow .18s ease,filter .18s ease}.journal-card:hover{transform:translateY(-2px);box-shadow:0 16px 32px -18px rgba(140,100,200,.62);filter:saturate(1.03)}.done-btn{transition:transform .14s ease,box-shadow .14s ease,filter .14s ease,opacity .14s ease}.done-btn:hover:not(:disabled){transform:translateY(-2px) scale(1.02);filter:saturate(1.05);box-shadow:0 18px 34px -12px rgba(120,100,220,.88)}.done-btn:active:not(:disabled){transform:translateY(0) scale(.99);box-shadow:0 12px 22px -12px rgba(120,100,220,.72)}</style></head><body>
<div style="width:390px;height:844px;background:radial-gradient(130% 55% at 50% 0%,#FFDCD0,#FDF3FF 58%);border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);display:flex;flex-direction:column;color:#4A3550">
  <div aria-hidden="true" style="height:35px;flex:none"></div>

  <div style="flex:1;padding:14px 24px 22px;display:flex;flex-direction:column;gap:14px;min-height:0">
    <div class="topline" style="margin-bottom:8px">
      <button onClick="history.back()" class="back" style="width:34px;height:34px;border:none;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px -6px rgba(140,100,200,.6);cursor:pointer;flex:none" type="button" aria-label="뒤로 가기"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8.5 2.5L4 7l4.5 4.5" stroke="#9A7FAD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
    <div style="display:flex;align-items:center;gap:8px"><span id="strategyPill" style="font:700 11px Pretendard;color:#fff;background:#A98BE8;padding:6px 12px;border-radius:20px;display:none"></span><p style="margin:0;font:500 14px Pretendard;color:#9A7FAD">5개 중 <b style="color:#4A3550">최대 2개</b>를 골라 답해줘</p></div>
    <div id="checks" style="display:flex;flex-direction:column;gap:10px;align-items:stretch">
      <button type="button" class="check-item" data-active="false" style="width:100%;box-sizing:border-box;background:#fff;border:2px solid #E7DBF3;border-radius:16px;padding:13px 14px;display:flex;gap:11px;align-items:center;box-shadow:0 8px 18px -18px rgba(140,100,200,.5);cursor:pointer;text-align:left">
        <div class="box" style="width:22px;height:22px;border-radius:8px;border:2px solid #DDD2ED;flex:none"></div><span style="font:600 13px/1.4 Pretendard;color:#9A7FAD">그 감정을 남에게 냈다면 어땠을까?</span>
      </button>
      <button type="button" class="check-item" data-active="false" style="width:100%;box-sizing:border-box;background:#fff;border:2px solid #E7DBF3;border-radius:16px;padding:13px 14px;display:flex;gap:11px;align-items:center;box-shadow:0 8px 18px -18px rgba(140,100,200,.5);cursor:pointer;text-align:left">
        <div class="box" style="width:22px;height:22px;border-radius:8px;border:2px solid #DDD2ED;flex:none"></div><span style="font:600 13px/1.4 Pretendard;color:#9A7FAD">나를 탓한 이유는 뭐였을까?</span>
      </button>
      <button type="button" class="check-item" data-active="false" style="width:100%;box-sizing:border-box;background:#fff;border:2px solid #E7DBF3;border-radius:16px;padding:13px 14px;display:flex;gap:11px;align-items:center;box-shadow:0 8px 18px -18px rgba(140,100,200,.5);cursor:pointer;text-align:left">
        <div class="box" style="width:22px;height:22px;border-radius:8px;border:2px solid #DDD2ED;flex:none"></div><span style="font:600 13px/1.4 Pretendard;color:#9A7FAD">그때 진짜 원했던 건?</span>
      </button>
      <button type="button" class="check-item" data-active="false" style="width:100%;box-sizing:border-box;background:#fff;border:2px solid #E7DBF3;border-radius:16px;padding:13px 14px;display:flex;gap:11px;align-items:center;box-shadow:0 8px 18px -18px rgba(140,100,200,.5);cursor:pointer;text-align:left">
        <div class="box" style="width:22px;height:22px;border-radius:8px;border:2px solid #DDD2ED;flex:none"></div><span style="font:600 13px/1.4 Pretendard;color:#9A7FAD">비슷한 순간이 또 있었어?</span>
      </button>
      <button type="button" class="check-item" data-active="false" style="width:100%;box-sizing:border-box;background:#fff;border:2px solid #E7DBF3;border-radius:16px;padding:13px 14px;display:flex;gap:11px;align-items:center;box-shadow:0 8px 18px -18px rgba(140,100,200,.5);cursor:pointer;text-align:left">
        <div class="box" style="width:22px;height:22px;border-radius:8px;border:2px solid #DDD2ED;flex:none"></div><span style="font:600 13px/1.4 Pretendard;color:#9A7FAD">스스로에게 해주고 싶은 말은?</span>
      </button>
    </div>
    <div class="journal-card" style="background:#fff;border-radius:20px;padding:16px 16px;flex:1;box-shadow:0 12px 28px -20px rgba(140,100,200,.5);display:flex;flex-direction:column;min-height:0">
      <p style="margin:0 0 10px;font:700 12px Pretendard;color:#B08FC0">오늘의 일기</p>
      <p style="margin:0 0 10px;font:500 13px Pretendard;color:#C6B4D4">고른 질문에 답을 적어줘. 길어도 괜찮아.</p>
      <textarea id="journalInput" placeholder="오늘 일어난 일, 느낀 것, 떠오른 생각을 적어줘." style="flex:1;min-height:140px;border:none;outline:none;background:#F7F2FC;border-radius:16px;padding:14px 14px;resize:none;font:500 13px/1.7 Pretendard;color:#4A3550"></textarea>
    </div>
    <button id="doneBtn" class="done-btn" disabled style="border:none;width:100%;background:linear-gradient(90deg,#A98BE8,#7FA8F0);color:#fff;font:400 20px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:default;box-shadow:0 14px 28px -12px rgba(120,100,220,.8);opacity:.5">다 썼어</button>
  </div>
</div>
<script>
  const items = [...document.querySelectorAll('.check-item')];
  let selected = 0;
  items.forEach((item) => item.addEventListener('click', () => {
    const active = item.dataset.active === 'true';
    if (!active && selected >= 2) return;
    item.dataset.active = String(!active);
    const box = item.querySelector('.box');
    const text = item.querySelector('span');
    if (!box || !text) return;
    if (!active) {
      selected += 1;
      item.style.border = '2px solid #A98BE8';
      box.style.background = '#A98BE8';
      box.style.border = 'none';
      box.style.display = 'flex';
      box.style.alignItems = 'center';
      box.style.justifyContent = 'center';
      box.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>';
      text.style.color = '#4A3550';
    } else {
      selected -= 1;
      item.style.border = '2px solid #E7DBF3';
      box.style.background = 'transparent';
      box.style.border = '2px solid #DDD2ED';
      box.innerHTML = '';
      text.style.color = '#9A7FAD';
    }
  }));

  // Read previously-selected strategy (from hardness-check) and show it
  try {
    const strategy = localStorage.getItem('selectedStrategy');
    const pill = document.getElementById('strategyPill');
    if (strategy && pill) {
      pill.textContent = strategy;
      pill.style.display = 'inline-block';
    } else if (pill) {
      pill.style.display = 'none';
    }
  } catch (e) { /* ignore storage errors */ }

  // Enable the Done button only when at least one question is selected and journal has text
  const doneBtn = document.getElementById('doneBtn');
  const journalInputEl = document.getElementById('journalInput');
  function updateDoneButton() {
    const hasText = journalInputEl && journalInputEl.value && journalInputEl.value.trim().length > 0;
    const canProceed = selected > 0 && hasText;
    if (doneBtn) {
      doneBtn.disabled = !canProceed;
      doneBtn.style.opacity = canProceed ? '1' : '.5';
      doneBtn.style.cursor = canProceed ? 'pointer' : 'default';
    }
  }
  // call after selection changes and on input
  items.forEach((item) => item.addEventListener('click', updateDoneButton));
  if (journalInputEl) journalInputEl.addEventListener('input', updateDoneButton);
  // initial update
  updateDoneButton();
  if (doneBtn) {
    doneBtn.addEventListener('click', () => {
      if (doneBtn.disabled) return;
      try {
        // collect selected questions
        const selectedQuestions = items.filter((it) => it.dataset.active === 'true').map((it) => {
          const s = it.querySelector('span');
          return s ? s.textContent.trim() : '';
        }).filter(Boolean);
        const journalText = journalInputEl ? journalInputEl.value.trim() : '';
          // save in both localStorage and sessionStorage as a fallback
          try { localStorage.setItem('journalSelectedQuestions', JSON.stringify(selectedQuestions)); } catch (e) {}
          try { localStorage.setItem('journalText', journalText); } catch (e) {}
          try { sessionStorage.setItem('journalSelectedQuestions', JSON.stringify(selectedQuestions)); } catch (e) {}
          try { sessionStorage.setItem('journalText', journalText); } catch (e) {}
      } catch (e) { /* ignore storage errors */ }
      // Also pass via URL to avoid storage-loss across origins
      try {
        const params = new URLSearchParams();
        params.set('q', JSON.stringify(selectedQuestions));
        params.set('t', journalText);
        location.href = './ai-comment.html?' + params.toString();
      } catch (err) {
        location.href = './ai-comment.html';
      }
    });
  }
</script>
<script type="module" src="../js/entry.js?v=20260722-ai-comment-flow"></script>
</body></html>
