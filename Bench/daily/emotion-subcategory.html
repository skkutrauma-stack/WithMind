<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"></head><body>
<div style="width:390px;min-height:844px;background:radial-gradient(120% 45% at 30% 0%,#FFEFC9,#FDF3FF 55%);border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);display:flex;flex-direction:column;color:#4A3550">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 30px 4px;font:600 15px Pretendard"><span>9:41</span><div style="display:flex;gap:7px;align-items:center"><svg width="18" height="12" viewBox="0 0 18 12" fill="#4A3550"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/></svg><svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3" fill="none" stroke="#4A3550" stroke-opacity=".4"/><rect x="3" y="3" width="15" height="7" rx="1.5" fill="#4A3550"/></svg></div></div>
  <div style="flex:1;padding:16px 24px 22px;display:flex;flex-direction:column">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 6l-6 6 6 6" stroke="#9A7FAD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span style="font:700 12px Pretendard;color:#fff;background:#FFB020;padding:6px 13px;border-radius:20px">기쁨</span><span style="font:700 11px Pretendard;color:#A98BE8;background:#EDE7FB;padding:6px 11px;border-radius:20px">1개 선택</span></div>
    <p style="margin:0 0 5px;font:700 12px Pretendard;color:#FFB020">기쁨 · 소분류</p>
    <h1 style="margin:0;font:400 25px/1.3 Jua,Pretendard;color:#4A3550">기쁨, 좀 더 들여다볼까?</h1>
    <p style="margin:6px 0 18px;font:500 13px Pretendard;color:#9A7FAD">가장 가까운 결을 하나만</p>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:20px;padding:15px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><div style="width:28px;height:28px;border-radius:50%;background:#FFC24B;flex:none"></div><span style="font:400 15px Jua,Pretendard;color:#6A5A78">기쁨</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:20px;padding:15px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><div style="width:28px;height:28px;border-radius:50%;background:#FFD37A;flex:none"></div><span style="font:400 15px Jua,Pretendard;color:#6A5A78">편안함</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:20px;padding:15px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><div style="width:28px;height:28px;border-radius:50%;background:#FFB65A;flex:none"></div><span style="font:400 15px Jua,Pretendard;color:#6A5A78">뿌듯함</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:20px;padding:15px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><div style="width:28px;height:28px;border-radius:50%;background:#FFCE6B;flex:none"></div><span style="font:400 15px Jua,Pretendard;color:#6A5A78">설렘</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:20px;padding:15px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><div style="width:28px;height:28px;border-radius:50%;background:#FFDA8A;flex:none"></div><span style="font:400 15px Jua,Pretendard;color:#6A5A78">감사함</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:20px;padding:15px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><div style="width:28px;height:28px;border-radius:50%;background:#FFC24B;flex:none"></div><span style="font:400 15px Jua,Pretendard;color:#6A5A78">기대감</span></button>
      <button type="button" data-active="true" style="border:2.5px solid #FFB020;background:#fff;border-radius:20px;padding:15px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 18px -12px rgba(255,180,60,.7);cursor:pointer"><div style="width:28px;height:28px;border-radius:50%;background:#FFB020;flex:none;display:flex;align-items:center;justify-content:center"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L19 7" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span style="font:400 15px Jua,Pretendard;color:#4A3550">안도감</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:20px;padding:15px 14px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><div style="width:28px;height:28px;border-radius:50%;background:#FFD37A;flex:none"></div><span style="font:400 15px Jua,Pretendard;color:#6A5A78">즐거움</span></button>
    </div>
    <div style="background:#fff;border-radius:16px;padding:13px 16px;margin-top:16px;font:400 15px Jua,Pretendard;color:#6A5A78;text-align:center;box-shadow:0 8px 18px -18px rgba(140,100,200,.5)">기쁨에서 <b style="color:#FFB020">안도감</b></div>
    <div style="flex:1"></div>
    <button onClick="location.href='./checkin.html'" style="border:none;width:100%;background:linear-gradient(90deg,#A98BE8,#7FA8F0);color:#fff;font:400 20px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:pointer;box-shadow:0 14px 28px -12px rgba(120,100,220,.8);margin-top:14px">EMA 체크인 하기</button>
  </div>
  <div style="display:flex;justify-content:center;padding:8px 0 12px"><div style="width:130px;height:5px;border-radius:3px;background:#4A3550;opacity:.16"></div></div>
  <script>
    const subCards = [...document.querySelectorAll('button[data-active]')];
    subCards.forEach((card) => card.addEventListener('click', () => {
      subCards.forEach((c) => {
        const active = c === card;
        c.dataset.active = String(active);
        c.style.border = active ? '2.5px solid #FFB020' : 'none';
        c.style.boxShadow = active ? '0 8px 18px -12px rgba(255,180,60,.7)' : '0 8px 18px -16px rgba(140,100,200,.5)';
        const label = c.querySelector('span');
        if (label) label.style.color = active ? '#4A3550' : '#6A5A78';
        const dot = c.querySelector('div');
        if (dot) dot.style.background = active ? '#FFB020' : dot.style.background;
      });
    }));
  </script>
</body></html>
