<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet"><style>html,body{margin:0;min-height:100%;font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:radial-gradient(120% 50% at 50% 0%,#E7DFFF,#FDF3FF 55%)}body{display:flex;justify-content:center;align-items:center;min-height:100vh;box-sizing:border-box}</style></head><body>
<div style="width:390px;min-height:844px;background:radial-gradient(120% 50% at 50% 0%,#E7DFFF,#FDF3FF 55%);border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);display:flex;flex-direction:column;color:#4A3550">
  <div aria-hidden="true" style="height:35px;flex:none"></div>
  <div style="padding:14px 26px 6px;display:flex;align-items:center;gap:14px"><div style="flex:1;height:10px;border-radius:6px;background:#EDE4FA;overflow:hidden"><div style="width:100%;height:100%;background:linear-gradient(90deg,#A98BE8,#7FA8F0);border-radius:6px"></div></div><span style="font:400 15px Jua,Pretendard;color:#7A63C8">STEP 8</span><div style="width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px -6px rgba(140,100,200,.6)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="#8A76B0" stroke-width="2" stroke-linecap="round"/></svg></div></div>
  <div style="flex:1;padding:14px 24px 22px;display:flex;flex-direction:column;gap:14px">
    <div><p style="margin:0 0 5px;font:700 12px Pretendard;color:#A98BE8">오늘의 기록</p><h1 style="margin:0;font:400 30px/1.15 Jua,Pretendard;color:#4A3550">지우야, 오늘 어때?</h1></div>
    <div style="background:#fff;border-radius:20px;padding:16px 16px;box-shadow:0 10px 24px -18px rgba(140,100,200,.5)">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #F0E9FB;gap:12px">
        <span style="font:500 12px Pretendard;color:#B08FC0;flex:none">선택 감정</span>
        <span id="selectedEmotion" style="display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-wrap:wrap;text-align:right;font:700 12px Pretendard;color:#4A3550"></span>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #F0E9FB;gap:12px">
        <span style="font:500 12px Pretendard;color:#B08FC0;flex:none">EMA 유형</span>
        <span id="emaType" style="display:inline-flex;align-items:center;justify-content:flex-end;flex-wrap:wrap;text-align:right;font:700 12px Pretendard;color:#4A3550">안도–회복형</span>
      </div>
      <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F0E9FB"><span style="font:500 12px Pretendard;color:#B08FC0">접촉경계</span><span id="contactBoundary" style="font:700 12px Pretendard;color:#A98BE8">반전</span></div>
    </div>
    <div style="background:#fff;border-radius:20px;padding:16px 16px;box-shadow:0 10px 24px -18px rgba(140,100,200,.5)">
      <p style="margin:0 0 10px;font:700 12px Pretendard;color:#B08FC0">상황</p>
      <p id="answeredSituation" style="margin:0;font:700 13px/1.6 Pretendard;color:#4A3550">발표 뒤 긴장 풀림</p>
    </div>
    <div id="storageDebug" style="margin-top:8px;color:#8a7fa0;font:12px Pretendard;white-space:pre-wrap;display:none"></div>
    <script>
      function escapeHtml(str) {
        return String(str).replace(/[&<>"']/g, function (s) {
          return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]);
        });
      }
      // Show selected strategy from hardness-check (if any)
      try {
        const strat = localStorage.getItem('selectedStrategy');
        const el = document.getElementById('contactBoundary');
        if (el) {
          if (strat) {
            el.textContent = strat;
            el.style.color = '#A98BE8';
          } else {
            // leave existing text if none selected, or clear
            // el.textContent = '';
          }
        }
      } catch (e) { /* ignore storage errors */ }
      // Show selected emotion from emotion pages (if any)
      try {
        const emoEl = document.getElementById('selectedEmotion');
        const main = localStorage.getItem('selectedEmotionMain');
        const subListRaw = localStorage.getItem('selectedEmotionSubList');
        let subList = [];
        try {
          subList = subListRaw ? JSON.parse(subListRaw) : [];
        } catch (e) {
          subList = [];
        }
        const subText = Array.isArray(subList) ? subList.filter(Boolean).join(', ') : '';
        if (emoEl) {
          if (main && subText) {
            emoEl.innerHTML = '<span style="padding:4px 9px;border-radius:999px;background:#F3E9FB;color:#7A63C8">' + escapeHtml(main) + '</span><span style="color:#B08FC0">›</span><span style="padding:4px 9px;border-radius:999px;background:#EAF6FF;color:#4A8FC8">' + escapeHtml(subText) + '</span>';
          } else if (main) {
            emoEl.innerHTML = '<span style="padding:4px 9px;border-radius:999px;background:#F3E9FB;color:#7A63C8">' + escapeHtml(main) + '</span>';
          } else {
            const emo = localStorage.getItem('selectedEmotion');
            if (emo) emoEl.textContent = emo;
          }
        }
      } catch (e) { /* ignore */ }
      // Show selected mood character from mood-character page (if any)
      try {
        const emaEl = document.getElementById('emaType');
        const character = localStorage.getItem('selectedMoodCharacter');
        if (emaEl) {
          if (character) {
            emaEl.innerHTML = '<span style="padding:4px 9px;border-radius:999px;background:#F7EFFC;color:#7A63C8">' + character.replace(/[&<>"']/g, function(s){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[s]; }) + '</span>';
          } else {
            emaEl.textContent = '';
          }
        }
      } catch (e) { /* ignore */ }
      try {
        const situationEl = document.getElementById('answeredSituation');
        const journalText = localStorage.getItem('journalText') || '';
        if (situationEl) situationEl.textContent = journalText.trim() ? journalText : '';
      } catch (e) { /* ignore */ }
    </script>
    <div id="answeredBox" style="background:#fff;border-radius:20px;padding:16px 16px;box-shadow:0 10px 24px -18px rgba(140,100,200,.5)">
      <p style="margin:0 0 10px;font:700 12px Pretendard;color:#B08FC0">내가 답한 것</p>
      <div id="answeredList">
        <!-- populated dynamically from journal -->
      </div>
    </div>
    <script>
      (function(){
        try {
          const listEl = document.getElementById('answeredList');
          // prefer URL params, then localStorage, then sessionStorage
          let qJson = null;
          let journalText = '';
          try {
            const urlParams = new URLSearchParams(window.location.search);
            const paramQ = urlParams.get('q');
            const paramT = urlParams.get('t');
            if (paramQ !== null) {
              qJson = paramQ;
            } else {
              qJson = localStorage.getItem('journalSelectedQuestions');
              try { if ((!qJson || qJson === 'null') && sessionStorage.getItem('journalSelectedQuestions')) qJson = sessionStorage.getItem('journalSelectedQuestions'); } catch (e) {}
            }
            if (paramT !== null) {
              journalText = paramT;
            } else {
              journalText = localStorage.getItem('journalText') || '';
              try { if ((!journalText || journalText === 'null') && sessionStorage.getItem('journalText')) journalText = sessionStorage.getItem('journalText'); } catch (e) {}
            }
          } catch (e) {
            // fallback to storage only
            qJson = localStorage.getItem('journalSelectedQuestions');
            journalText = localStorage.getItem('journalText') || '';
            try { if ((!qJson || qJson === 'null') && sessionStorage.getItem('journalSelectedQuestions')) qJson = sessionStorage.getItem('journalSelectedQuestions'); } catch (e) {}
            try { if ((!journalText || journalText === 'null') && sessionStorage.getItem('journalText')) journalText = sessionStorage.getItem('journalText'); } catch (e) {}
          }
          let qs = [];
          try { qs = qJson ? JSON.parse(qJson) : []; } catch (err) { qs = []; }
          if (!listEl) return;
          if (qs.length === 0 && (!journalText || journalText.trim().length === 0)) {
            listEl.innerHTML = '<p style="margin:0;font:500 13px/1.5 Pretendard;color:#6A5A78">답한 질문이나 일기가 없습니다.</p>';
            return;
          }
          const parts = [];
          if (qs.length > 0) {
            qs.slice(0, 2).forEach((q) => {
              parts.push(`
                <div style="padding:8px 0;border-bottom:1px solid #F4EEF9">
                  <p style="margin:0 0 3px;font:700 12px Pretendard;color:#A98BE8">Q.</p>
                  <p style="margin:0;font:500 13px/1.55 Pretendard;color:#4A3550">${escapeHtml(q)}</p>
                </div>
              `);
            });
          }
          if (journalText && journalText.trim().length > 0) {
            parts.push(`
              <div style="padding-top:8px">
                <p style="margin:0 0 3px;font:700 12px Pretendard;color:#7A63C8">A.</p>
                <p style="margin:0;font:500 13px/1.65 Pretendard;color:#6A5A78">${escapeHtml(journalText)}</p>
              </div>
            `);
          }
          listEl.innerHTML = parts.join('');
        } catch (e) { /* ignore */ }

        function escapeHtml(str){ return String(str).replace(/[&<>"']/g, function(s){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[s]; }); }
      })();
    </script>
    <div style="background:linear-gradient(150deg,#A98BE8,#8FA8F0);border-radius:22px;padding:20px 20px;color:#fff">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8z"/></svg><span style="font:400 16px Jua,Pretendard">마음 도사의 코멘트</span></div>
      <p style="margin:0;font:500 15px/1.65 Pretendard">화를 삼키고 스스로를 다독인 하루였네. 참은 게 나빴다는 뜻은 아니야. 다음엔 "나 지금 좀 속상했어" 한마디가 너를 덜 젖게 해줄 거야.</p>
    </div>
    <div style="display:flex;gap:9px;align-items:flex-start;background:#EAF6FF;border-radius:14px;padding:12px 14px"><svg width="18" height="18" viewBox="0 0 24 24" fill="#5AB0E8" style="flex:none"><circle cx="12" cy="12" r="10" opacity=".2"/><path d="M12 7v.5M12 11v6" stroke="#5AB0E8" stroke-width="2.2" stroke-linecap="round"/></svg><p style="margin:0;font:500 11px/1.5 Pretendard;color:#5E8AA6">이건 진단이 아니라 기록을 함께 읽은 거야. 많이 힘들면 109·1388로 연락해도 돼.</p></div>
    <div style="flex:1"></div>
  </div>
  <div style="display:flex;justify-content:space-around;align-items:center;padding:12px 16px 8px;background:#fff;border-top:1px solid #F0E4F5">
    <div onClick="location.href='../home/home.html'" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 11L12 4l8 7M6 10v9h12v-9" stroke="#C6B4D4" stroke-width="1.7" stroke-linejoin="round"/></svg><span style="font:600 10px Pretendard;color:#C6B4D4">홈</span></div>
    <div onClick="location.href='../record/emotion.html'" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M6 5h9a2 2 0 0 1 2 2v12H8a2 2 0 0 0-2 2z" stroke="#C6B4D4" stroke-width="1.7" stroke-linejoin="round"/></svg><span style="font:600 10px Pretendard;color:#C6B4D4">기록</span></div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:default"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 6h14a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-6l-4 3v-3H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z" stroke="#C6B4D4" stroke-width="1.7" stroke-linejoin="round"/><circle cx="9" cy="11" r="1.1" fill="#C6B4D4"/><circle cx="12" cy="11" r="1.1" fill="#C6B4D4"/><circle cx="15" cy="11" r="1.1" fill="#C6B4D4"/></svg><span style="font:600 10px Pretendard;color:#C6B4D4">챗봇</span></div>
    <div onClick="location.href='../safetyplan/home.html'" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 20C5 15 4 9 7.5 7.5S12 9 12 9s1-2.6 4.5-1.5S19 15 12 20z" stroke="#C6B4D4" stroke-width="1.7" stroke-linejoin="round"/></svg><span style="font:600 10px Pretendard;color:#C6B4D4">SOS</span></div>
  </div>
</div></body></html>
