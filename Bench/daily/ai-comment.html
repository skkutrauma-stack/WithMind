<div style="width:390px;min-height:844px;background:radial-gradient(120% 50% at 50% 0%,#E7DFFF,#FDF3FF 55%);border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);display:flex;flex-direction:column;color:#4A3550">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 30px 4px;font:600 15px Pretendard"><span>9:41</span><div style="display:flex;gap:7px;align-items:center"><svg width="18" height="12" viewBox="0 0 18 12" fill="#4A3550"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/></svg><svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3" fill="none" stroke="#4A3550" stroke-opacity=".4"/><rect x="3" y="3" width="15" height="7" rx="1.5" fill="#4A3550"/></svg></div></div>
  <div style="padding:14px 26px 6px;display:flex;align-items:center;gap:14px"><div style="flex:1;height:10px;border-radius:6px;background:#EDE4FA;overflow:hidden"><div style="width:100%;height:100%;background:linear-gradient(90deg,#A98BE8,#7FA8F0);border-radius:6px"></div></div><span style="font:400 15px Jua,Pretendard;color:#7A63C8">STEP 8</span><div style="width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px -6px rgba(140,100,200,.6)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="#8A76B0" stroke-width="2" stroke-linecap="round"/></svg></div></div>
  <div style="flex:1;padding:14px 24px 22px;display:flex;flex-direction:column;gap:14px">
    <div><p style="margin:0 0 5px;font:700 12px Pretendard;color:#A98BE8">오늘의 기록</p><h1 style="margin:0;font:400 24px/1.35 Jua,Pretendard;color:#4A3550">지우의 오늘,<br>이렇게 읽었어</h1></div>
    <div style="background:#fff;border-radius:20px;padding:16px 16px;box-shadow:0 10px 24px -18px rgba(140,100,200,.5)">
      <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F0E9FB"><span style="font:500 12px Pretendard;color:#B08FC0">선택 감정</span><span id="selectedEmotion" style="font:700 12px Pretendard">기쁨 › 안도감</span></div>
      <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F0E9FB"><span style="font:500 12px Pretendard;color:#B08FC0">EMA 유형</span><span style="font:700 12px Pretendard">안도–회복형</span></div>
      <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #F0E9FB"><span style="font:500 12px Pretendard;color:#B08FC0">접촉경계</span><span id="contactBoundary" style="font:700 12px Pretendard;color:#A98BE8">반전</span></div>
      <div style="display:flex;justify-content:space-between;padding:7px 0"><span style="font:500 12px Pretendard;color:#B08FC0">상황</span><span style="font:700 12px Pretendard">발표 뒤 긴장 풀림</span></div>
    </div>
    <div id="storageDebug" style="margin-top:8px;color:#8a7fa0;font:12px Pretendard;white-space:pre-wrap;display:none"></div>
    <script>
      // Show selected strategy from hardness-check (if any)
      try {
        const strat = localStorage.getItem('selectedStrategy');
        const el = document.getElementById('contactBoundary');
        if (el) {
          if (strat) {
            el.textContent = strat;
            el.style.color = '#A98BE8';
          } else {
            // leave existing text if none selected, or clear
            // el.textContent = '';
          }
        }
      } catch (e) { /* ignore storage errors */ }
      // Show selected emotion from emotion pages (if any)
      try {
        const emo = localStorage.getItem('selectedEmotion');
        const emoEl = document.getElementById('selectedEmotion');
        if (emo && emoEl) emoEl.textContent = emo;
      } catch (e) { /* ignore */ }
    </script>
    <div id="answeredBox" style="background:#fff;border-radius:20px;padding:16px 16px;box-shadow:0 10px 24px -18px rgba(140,100,200,.5)">
      <p style="margin:0 0 10px;font:700 12px Pretendard;color:#B08FC0">내가 답한 것</p>
      <div id="answeredList">
        <!-- populated dynamically from journal -->
      </div>
    </div>
    <script>
      (function(){
        try {
          const listEl = document.getElementById('answeredList');
          // prefer URL params, then localStorage, then sessionStorage
          let qJson = null;
          let journalText = '';
          try {
            const urlParams = new URLSearchParams(window.location.search);
            const paramQ = urlParams.get('q');
            const paramT = urlParams.get('t');
            if (paramQ !== null) {
              qJson = paramQ;
            } else {
              qJson = localStorage.getItem('journalSelectedQuestions');
              try { if ((!qJson || qJson === 'null') && sessionStorage.getItem('journalSelectedQuestions')) qJson = sessionStorage.getItem('journalSelectedQuestions'); } catch (e) {}
            }
            if (paramT !== null) {
              journalText = paramT;
            } else {
              journalText = localStorage.getItem('journalText') || '';
              try { if ((!journalText || journalText === 'null') && sessionStorage.getItem('journalText')) journalText = sessionStorage.getItem('journalText'); } catch (e) {}
            }
          } catch (e) {
            // fallback to storage only
            qJson = localStorage.getItem('journalSelectedQuestions');
            journalText = localStorage.getItem('journalText') || '';
            try { if ((!qJson || qJson === 'null') && sessionStorage.getItem('journalSelectedQuestions')) qJson = sessionStorage.getItem('journalSelectedQuestions'); } catch (e) {}
            try { if ((!journalText || journalText === 'null') && sessionStorage.getItem('journalText')) journalText = sessionStorage.getItem('journalText'); } catch (e) {}
          }
          let qs = [];
          try { qs = qJson ? JSON.parse(qJson) : []; } catch (err) { qs = []; }
          if (!listEl) return;
          if (qs.length === 0 && (!journalText || journalText.trim().length === 0)) {
            listEl.innerHTML = '<p style="margin:0;font:500 13px/1.5 Pretendard;color:#6A5A78">답한 질문이나 일기가 없습니다.</p>';
            // reveal raw storage for debugging (local and session)
            const dbg = document.getElementById('storageDebug');
            if (dbg) {
              const lq = (()=>{try{return localStorage.getItem('journalSelectedQuestions')}catch(e){return 'err'}})();
              const lt = (()=>{try{return localStorage.getItem('journalText')}catch(e){return 'err'}})();
              const sq = (()=>{try{return sessionStorage.getItem('journalSelectedQuestions')}catch(e){return 'err'}})();
              const st = (()=>{try{return sessionStorage.getItem('journalText')}catch(e){return 'err'}})();
              dbg.style.display = 'block';
              dbg.textContent = 'local.journalSelectedQuestions: ' + String(lq) + '\nlocal.journalText: ' + String(lt) + '\nsession.journalSelectedQuestions: ' + String(sq) + '\nsession.journalText: ' + String(st);
            }
            return;
          }
          const parts = [];
          if (qs.length === 0) {
            if (journalText && journalText.trim().length > 0) {
              parts.push('<p style="margin:0 0 3px;font:700 13px Pretendard;color:#A98BE8'>Q.</p>');
              parts.push('<p style="margin:0;font:500 13px/1.5 Pretendard;color:#6A5A78'>A. ' + escapeHtml(journalText) + '</p>');
            } else {
              parts.push('<p style="margin:0;font:500 13px/1.5 Pretendard;color:#6A5A78'>답한 질문이나 일기가 없습니다.</p>');
            }
          } else if (qs.length === 1) {
            parts.push('<p style="margin:0 0 3px;font:700 13px Pretendard;color:#A98BE8'>Q. ' + escapeHtml(qs[0]) + '</p>');
            parts.push('<p style="margin:0;font:500 13px/1.5 Pretendard;color:#6A5A78'>A. ' + escapeHtml(journalText) + '</p>');
          } else {
            // two or more: show first two questions then a single answer
            parts.push('<p style="margin:0 0 3px;font:700 13px Pretendard;color:#A98BE8'>Q. ' + escapeHtml(qs[0]) + '</p>');
            parts.push('<p style="margin:0 0 3px;font:700 13px Pretendard;color:#A98BE8'>Q. ' + escapeHtml(qs[1]) + '</p>');
            parts.push('<p style="margin:0;font:500 13px/1.5 Pretendard;color:#6A5A78'>A. ' + escapeHtml(journalText) + '</p>');
          }
          listEl.innerHTML = parts.join('');
          const dbg = document.getElementById('storageDebug');
          if (dbg) {
            const lq = (()=>{try{return localStorage.getItem('journalSelectedQuestions')}catch(e){return 'err'}})();
            const lt = (()=>{try{return localStorage.getItem('journalText')}catch(e){return 'err'}})();
            const sq = (()=>{try{return sessionStorage.getItem('journalSelectedQuestions')}catch(e){return 'err'}})();
            const st = (()=>{try{return sessionStorage.getItem('journalText')}catch(e){return 'err'}})();
            dbg.style.display = 'block';
            dbg.textContent = 'local.journalSelectedQuestions: ' + String(lq) + '\nlocal.journalText: ' + String(lt) + '\nsession.journalSelectedQuestions: ' + String(sq) + '\nsession.journalText: ' + String(st);
          }
        } catch (e) { /* ignore */ }

        function escapeHtml(str){ return String(str).replace(/[&<>"']/g, function(s){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[s]; }); }
      })();
    </script>
    <div style="background:linear-gradient(150deg,#A98BE8,#8FA8F0);border-radius:22px;padding:20px 20px;color:#fff">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8z"/></svg><span style="font:400 16px Jua,Pretendard">마음 도사의 코멘트</span></div>
      <p style="margin:0;font:500 15px/1.65 Pretendard">화를 삼키고 스스로를 다독인 하루였네. 참은 게 나빴다는 뜻은 아니야. 다음엔 "나 지금 좀 속상했어" 한마디가 너를 덜 젖게 해줄 거야.</p>
    </div>
    <div style="display:flex;gap:9px;align-items:flex-start;background:#EAF6FF;border-radius:14px;padding:12px 14px"><svg width="18" height="18" viewBox="0 0 24 24" fill="#5AB0E8" style="flex:none"><circle cx="12" cy="12" r="10" opacity=".2"/><path d="M12 7v.5M12 11v6" stroke="#5AB0E8" stroke-width="2.2" stroke-linecap="round"/></svg><p style="margin:0;font:500 11px/1.5 Pretendard;color:#5E8AA6">이건 진단이 아니라 기록을 함께 읽은 거야. 많이 힘들면 109·1388로 연락해도 돼.</p></div>
    <div style="flex:1"></div>
    <button onClick="location.href='../home/home.html'" style="border:none;width:100%;background:linear-gradient(90deg,#A98BE8,#7FA8F0);color:#fff;font:400 20px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:pointer;box-shadow:0 14px 28px -12px rgba(120,100,220,.8)">오늘은 여기까지</button>
  </div>
  <div style="display:flex;justify-content:center;padding:2px 0 12px"><div style="width:130px;height:5px;border-radius:3px;background:#4A3550;opacity:.16"></div></div>
</div></body></html>
