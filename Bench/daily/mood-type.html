<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><style>html,body{margin:0;min-height:100%;font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#f8f2ff}body{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px;box-sizing:border-box;overflow:auto}</style></head><body>
<div style="width:390px;min-height:844px;background:radial-gradient(120% 50% at 70% 4%,#FFD9E4,#FDF3FF 55%);border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);display:flex;flex-direction:column;color:#4A3550">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 30px 4px;font:600 15px Pretendard"><span>9:41</span><div style="display:flex;gap:7px;align-items:center"><svg width="18" height="12" viewBox="0 0 18 12" fill="#4A3550"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/></svg><svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3" fill="none" stroke="#4A3550" stroke-opacity=".4"/><rect x="3" y="3" width="15" height="7" rx="1.5" fill="#4A3550"/></svg></div></div>
  <div style="padding:14px 26px 6px;display:flex;align-items:center;gap:14px"><div style="flex:1;height:10px;border-radius:6px;background:#F3DEE9;overflow:hidden"><div style="width:62.5%;height:100%;background:linear-gradient(90deg,#FF8FB0,#A98BE8);border-radius:6px"></div></div><span style="font:400 15px Jua,Pretendard;color:#C86B90">STEP 5</span><div style="width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px -6px rgba(200,100,140,.5)"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 2l10 10M12 2L2 12" stroke="#B07690" stroke-width="2" stroke-linecap="round"/></svg></div></div>
  <div style="flex:1;padding:20px 26px 22px;display:flex;flex-direction:column;gap:16px">
    <div><p style="margin:0 0 5px;font:700 12px Pretendard;color:#A98BE8">마음 유형</p><h1 style="margin:0;font:400 25px/1.3 Jua,Pretendard;color:#4A3550">이런 마음에 가까웠어</h1><p style="margin:6px 0 0;font:500 13px Pretendard;color:#9A7FAD">맞으면 그대로, 아니면 상황을 적어줘</p></div>
    <div style="background:#fff;border-radius:26px;padding:20px 20px;box-shadow:0 14px 30px -20px rgba(140,100,200,.6)"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><svg width="20" height="20" viewBox="0 0 24 24" fill="#FF7A9C"><path d="M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8z"/></svg><span style="font:700 11px Pretendard;color:#B08FC0">감지된 유형</span></div><h2 style="margin:0 0 6px;font:400 22px Jua,Pretendard;color:#7A63C8">안도–회복형</h2><p style="margin:0;font:500 13px/1.55 Pretendard;color:#9A7FAD">긴장이 풀리며 마음이 가라앉는 결. 큰 일을 넘긴 뒤 찾아오는 편이야.</p></div>
    <div style="background:#fff;border-radius:26px;padding:18px 18px;box-shadow:0 14px 30px -20px rgba(140,100,200,.6)"><p style="margin:0 0 5px;font:700 12px Pretendard;color:#B08FC0">상황</p><p style="margin:0 0 12px;font:400 17px Jua,Pretendard;color:#4A3550">무슨 일이 있었길래 그랬을까?</p><textarea id="situationInput" placeholder="예) 발표가 끝나고 나서야 겨우 숨이 쉬어졌어…" style="width:100%;min-height:120px;border:none;outline:none;background:#F7F1FC;border-radius:16px;padding:15px 15px;box-sizing:border-box;resize:none;font:500 13px/1.6 Pretendard;color:#4A3550"></textarea></div>
    <div style="display:flex;gap:9px;align-items:flex-start;background:#EAF6FF;border-radius:16px;padding:13px 15px"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" style="flex:none"><rect x="5" y="10" width="14" height="10" rx="3" stroke="#5AB0E8" stroke-width="1.7"/><path d="M8 10V8a4 4 0 0 1 8 0v2" stroke="#5AB0E8" stroke-width="1.7"/></svg><p style="margin:0;font:500 11px/1.5 Pretendard;color:#5E8AA6">여기 적은 내용은 너만 볼 수 있어. 분석에만 쓰여.</p></div>
    <div style="flex:1"></div>
    <button id="nextBtn" disabled style="border:none;width:100%;background:linear-gradient(90deg,#A98BE8,#7FA8F0);color:#fff;font:400 20px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:not-allowed;opacity:0.6;box-shadow:0 14px 28px -12px rgba(120,100,220,.8)">다음</button>
  </div>
  <div style="display:flex;justify-content:center;padding:8px 0 12px"><div style="width:130px;height:5px;border-radius:3px;background:#4A3550;opacity:.16"></div></div>
</div>
<script>
  (function(){
    const ta = document.getElementById('situationInput');
    const btn = document.getElementById('nextBtn');
    function update(){
      const ok = ta && ta.value && ta.value.trim().length > 0;
      if(btn){
        btn.disabled = !ok;
        btn.style.cursor = ok ? 'pointer' : 'not-allowed';
        btn.style.opacity = ok ? '1' : '0.6';
      }
    }
    if(ta){ ta.addEventListener('input', update); update(); }
    if(btn){ btn.addEventListener('click', ()=>{ if(!btn.disabled) location.href='./hardness-check.html'; }); }
  })();
</script>
</body></html>
