  <div style="padding:8px 26px 30px"><button onClick="location.href='./mood-character.html'" style="border:none;width:100%;background:linear-gradient(90deg,#A98BE8,#7FA8F0);color:#fff;font:400 20px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:pointer;box-shadow:0 14px 28px -12px rgba(120,100,220,.8)">다음</button></div>
</div>
<script>
  function styleDot(dot, active) {
    const colors = {
      mood: active ? '#FF8A6B' : '#FFE0D3',
      hard: active ? '#5AB0E8' : '#DBEFFB',
      conn: active ? '#A98BE8' : '#EDE4FA'
    };
    const shadows = {
      mood: active ? '0 0 0 5px #FFD9CB,0 8px 16px -6px rgba(255,120,90,.7)' : 'none',
      hard: active ? '0 0 0 5px #C7E7F8,0 8px 16px -6px rgba(90,176,232,.7)' : 'none',
      conn: active ? '0 0 0 5px #E1D7F7,0 8px 16px -6px rgba(140,100,200,.7)' : 'none'
    };
    dot.style.background = colors[dot.closest('.qcard').dataset.q];
    dot.style.boxShadow = shadows[dot.closest('.qcard').dataset.q];
  }

  document.querySelectorAll('.qcard').forEach((card) => {
    const dots = [...card.querySelectorAll('.dot')];
    dots.forEach((dot) => dot.addEventListener('click', () => {
      dots.forEach((d) => {
        d.dataset.active = String(d === dot);
        styleDot(d, d === dot);
      });
    }));
  });
</script>
