<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet"><style>html,body{margin:0;min-height:100%;font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#f8f2ff;overflow:hidden}body{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px;box-sizing:border-box}.phone{width:390px;height:844px;background:radial-gradient(130% 50% at 20% 0%,#E7DFFF,#FDF3FF 55%);border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);display:flex;flex-direction:column;color:#4A3550}.status{display:flex;justify-content:flex-start;align-items:center;padding:16px 30px 0;font:600 15px Pretendard}.content{flex:1;min-height:0;padding:14px 24px 18px;display:flex;flex-direction:column;gap:14px}.topline{display:flex;align-items:center;gap:10px;margin-bottom:6px}.back{width:34px;height:34px;border:none;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px -6px rgba(140,100,200,.6);cursor:pointer;flex:none}.title{margin:0;font:400 30px/1.15 Jua,Pretendard;color:#4A3550}.subtitle{margin:0;font:500 14px Pretendard;color:#B08FC0}#questionList{flex:1;min-height:0;display:flex;flex-direction:column;gap:14px;overflow:auto;scrollbar-width:none;-ms-overflow-style:none}#questionList::-webkit-scrollbar{width:0;height:0}.footer{padding:8px 26px 30px}#nextButton{border:none;width:100%;background:#D8C7F2;color:#fff;font:400 20px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:not-allowed;box-shadow:none}</style></head><body>
<div class="phone">
  <div class="status"><span>9:41</span></div>
  <div class="content">
    <div class="topline" style="margin-bottom:8px">
      <button onClick="location.href='./emotion-subcategory.html'" class="back" type="button" aria-label="뒤로 가기"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8.5 2.5L4 7l4.5 4.5" stroke="#9A7FAD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
  <div style="padding-top:0;padding-bottom:8px">
      <p style="margin:0 0 5px;font:700 12px Pretendard;color:#A98BE8">오늘의 EMA</p>
      <h1 class="title" style="font-size:33px;line-height:1.12">지우야, 오늘 어때?</h1>
      <p class="subtitle" style="margin-top:6px">떠오르는 대로 골라줘</p>
    </div>
    <div id="questionList" style="flex:1;min-height:0;overflow:auto"></div>
    <div class="summary" id="selectionSummary" style="display:none"></div>
  </div>
  <div class="footer"><button id="nextButton" type="button" class="next" disabled>다음</button></div>
</div>
<script>
  const questions = [
    { id: 'q01', text: '오늘 가장 먼저 떠오른 감정은?', left: '가라앉음', right: '좋음', color: 'mood' },
    { id: 'q02', text: '지금 마음은 얼마나 무거워?', left: '가벼움', right: '무거움', color: 'hard' },
    { id: 'q03', text: '오늘 사람들과의 거리는 어땠어?', left: '혼자', right: '함께', color: 'conn' },
    { id: 'q04', text: '마음이 가장 먼저 반응한 장면은?', left: '조용함', right: '선명함', color: 'mood' },
    { id: 'q05', text: '오늘 버티는 데 힘이 많이 들었어?', left: '아님', right: '많이', color: 'hard' },
    { id: 'q06', text: '누군가의 한마디가 오래 남았어?', left: '아님', right: '그럼', color: 'conn' },
    { id: 'q07', text: '기분이 움직인 방향은 어느 쪽이야?', left: '가라앉음', right: '좋아짐', color: 'mood' },
    { id: 'q08', text: '몸과 마음이 동시에 지쳤어?', left: '아니', right: '그렇다', color: 'hard' },
    { id: 'q09', text: '혼자 있고 싶은 마음이 컸어?', left: '아니', right: '컸어', color: 'conn' },
    { id: 'q10', text: '오늘 하루의 분위기는 어땠어?', left: '차분', right: '요동', color: 'mood' },
    { id: 'q11', text: '감정을 참는 데 에너지가 들었어?', left: '아니', right: '많이', color: 'hard' },
    { id: 'q12', text: '누군가에게 기대고 싶었어?', left: '아니', right: '그랬어', color: 'conn' },
    { id: 'q13', text: '오늘의 마음은 꽤 복잡했어?', left: '단순', right: '복잡', color: 'mood' },
    { id: 'q14', text: '해야 할 일 앞에서 버거웠어?', left: '괜찮아', right: '버거워', color: 'hard' },
    { id: 'q15', text: '사람들의 시선이 많이 신경 쓰였어?', left: '아니', right: '많이', color: 'conn' },
    { id: 'q16', text: '마음이 들뜬 쪽이었어, 가라앉은 쪽이었어?', left: '가라앉음', right: '들뜸', color: 'mood' },
    { id: 'q17', text: '오늘 한 번쯤 멈추고 싶었어?', left: '아니', right: '그랬어', color: 'hard' },
    { id: 'q18', text: '누군가와 감정이 이어진 느낌이 있었어?', left: '아니', right: '있었어', color: 'conn' },
    { id: 'q19', text: '오늘 기분은 쉽게 바뀌었어?', left: '아니', right: '그랬어', color: 'mood' },
    { id: 'q20', text: '지나간 일을 떠올리면 다시 지쳤어?', left: '아니', right: '그랬어', color: 'hard' },
    { id: 'q21', text: '말보다 표정이 더 중요하게 느껴졌어?', left: '아니', right: '그랬어', color: 'conn' },
    { id: 'q22', text: '오늘 마음은 숨을 고르는 쪽이었어?', left: '아니', right: '그랬어', color: 'mood' },
    { id: 'q23', text: '정리되지 않은 감정이 남아있어?', left: '아니', right: '많아', color: 'hard' },
    { id: 'q24', text: '누군가와 멀어지고 싶었어?', left: '아니', right: '그랬어', color: 'conn' },
    { id: 'q25', text: '오늘 기분을 한 단어로 말하면?', left: '잔잔', right: '복잡', color: 'mood' },
    { id: 'q26', text: '스스로에게 너무 많은 걸 요구했어?', left: '아니', right: '그랬어', color: 'hard' },
    { id: 'q27', text: '주변 사람에게 마음이 흔들렸어?', left: '아니', right: '그랬어', color: 'conn' },
    { id: 'q28', text: '오늘은 마음이 쉬는 날 같았어?', left: '아니', right: '그랬어', color: 'mood' },
    { id: 'q29', text: '감정을 말로 꺼내기 어려웠어?', left: '아니', right: '그랬어', color: 'hard' },
    { id: 'q30', text: '누군가의 반응에 크게 영향을 받았어?', left: '아니', right: '그랬어', color: 'conn' },
    { id: 'q31', text: '오늘의 마음은 어떤 결에 가까웠어?', left: '가벼움', right: '무거움', color: 'mood' }
  ];

  const wrappers = {
    mood: { base: '#FFE0D3', active: '#FF8A6B', shadow: '0 0 0 5px #FFD9CB,0 8px 16px -6px rgba(255,120,90,.7)', left: '가라앉음', right: '좋음' },
    hard: { base: '#DBEFFB', active: '#5AB0E8', shadow: '0 0 0 5px #C7E7F8,0 8px 16px -6px rgba(90,176,232,.7)', left: '전혀', right: '매우' },
    conn: { base: '#EDE4FA', active: '#A98BE8', shadow: '0 0 0 5px #E1D7F7,0 8px 16px -6px rgba(140,100,200,.7)', left: '혼자', right: '함께' }
  };

  function renderQuestionCard(q, index, total) {
    const w = wrappers[q.color] || wrappers.mood;
    return `
      <div class="qcard" data-q="${q.id}" data-color="${q.color}" style="width:calc(100% - 8px);box-sizing:border-box;background:#fff;border-radius:28px;padding:22px 24px 24px;box-shadow:0 12px 28px -18px rgba(140,100,200,.5);transition:transform .22s ease,opacity .22s ease">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
          <span style="font:700 12px Pretendard;color:#A98BE8">질문 ${index + 1}/${total}</span>
        </div>
        <p style="margin:0 0 20px;font:400 17px Jua,Pretendard;color:#4A3550">${q.text}</p>
        <div class="dots" style="display:flex;align-items:center;justify-content:space-between;gap:10px;padding-right:2px">
          <button class="dot" type="button" data-active="false" style="width:18px;height:18px;border:none;border-radius:50%;background:${w.base};cursor:pointer;padding:0"></button>
          <button class="dot" type="button" data-active="false" style="width:18px;height:18px;border:none;border-radius:50%;background:${w.base};cursor:pointer;padding:0"></button>
          <button class="dot" type="button" data-active="false" style="width:18px;height:18px;border:none;border-radius:50%;background:${w.base};cursor:pointer;padding:0"></button>
          <button class="dot" type="button" data-active="false" style="width:18px;height:18px;border:none;border-radius:50%;background:${w.base};cursor:pointer;padding:0"></button>
          <button class="dot" type="button" data-active="false" style="width:18px;height:18px;border:none;border-radius:50%;background:${w.base};cursor:pointer;padding:0"></button>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:14px;font:600 11px Pretendard;color:#B08FC0;padding-right:4px"><span>${q.left || w.left}</span><span>${q.right || w.right}</span></div>
      </div>
    `;
  }

  const questionList = document.getElementById('questionList');
  const selectedAnswers = [];
  const nextButton = document.getElementById('nextButton');

  function styleDot(dot, active) {
    const card = dot.closest('.qcard');
    const color = card ? card.dataset.color : 'mood';
    const conf = wrappers[color] || wrappers.mood;
    dot.style.background = active ? conf.active : conf.base;
    dot.style.boxShadow = active ? conf.shadow : 'none';
  }

  function renderAllQuestions() {
    const total = questions.length;
    questionList.innerHTML = questions.map((q, index) => renderQuestionCard(q, index, total)).join('');
    const cards = [...questionList.querySelectorAll('.qcard')];

    cards.forEach((card, index) => {
      const dots = [...card.querySelectorAll('.dot')];
      dots.forEach((dot) => {
        dot.dataset.active = 'false';
        styleDot(dot, false);
        dot.addEventListener('click', () => {
          const wasSelected = dot.dataset.active === 'true';
          dots.forEach((d) => {
            d.dataset.active = String(d === dot);
            styleDot(d, d === dot);
          });
          selectedAnswers[index] = wasSelected ? null : dots.indexOf(dot);
          const nextCard = cards[index + 1];
          if (nextCard && !wasSelected) {
            nextCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
          const allAnswered = selectedAnswers.filter((v) => v !== undefined && v !== null).length === questions.length;
          nextButton.disabled = !allAnswered;
          nextButton.style.background = allAnswered ? 'linear-gradient(90deg,#A98BE8,#7FA8F0)' : '#D8C7F2';
          nextButton.style.cursor = allAnswered ? 'pointer' : 'not-allowed';
          nextButton.style.boxShadow = allAnswered ? '0 14px 28px -12px rgba(120,100,220,.8)' : 'none';
        });
      });
    });

    nextButton.disabled = true;
    nextButton.style.background = '#D8C7F2';
    nextButton.style.cursor = 'not-allowed';
    nextButton.style.boxShadow = 'none';
  }

  nextButton.addEventListener('click', () => {
    const allAnswered = selectedAnswers.filter((v) => v !== undefined && v !== null).length === questions.length;
    if (!allAnswered) return;
    try {
      localStorage.setItem('checkinAnswers', JSON.stringify(selectedAnswers));
    } catch (e) {}
    location.href = './mood-character.html';
  });

  renderAllQuestions();
</script>
</body></html>
