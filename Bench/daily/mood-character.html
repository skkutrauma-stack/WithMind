<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet"><style>html,body{margin:0;width:100%;height:100%;font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#f8f2ff;overflow:hidden}body{display:flex;justify-content:center;align-items:center;box-sizing:border-box}.back{transition:transform .14s ease,box-shadow .14s ease,filter .14s ease}.back:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 10px 18px -8px rgba(140,100,200,.7);filter:saturate(1.05)}.back:active{transform:translateY(0) scale(.98);box-shadow:0 6px 12px -8px rgba(140,100,200,.55)}.character-panel{transition:transform .18s ease,box-shadow .18s ease,filter .18s ease}.character-panel:hover{transform:translateY(-2px);box-shadow:0 18px 38px -18px rgba(200,100,160,.72);filter:saturate(1.03)}.action-btn{transition:transform .14s ease,box-shadow .14s ease,filter .14s ease}.action-btn:hover{transform:translateY(-2px) scale(1.02);box-shadow:0 18px 32px -12px rgba(255,111,120,.88);filter:saturate(1.06)}.action-btn:active{transform:translateY(0) scale(.99);box-shadow:0 12px 22px -12px rgba(255,111,120,.72)}</style></head><body>
<div style="width:390px;height:844px;background:radial-gradient(120% 55% at 50% 0%,#FFDCE8,#FDF3FF 60%);border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);display:flex;flex-direction:column;color:#4A3550">
  <div aria-hidden="true" style="height:35px;flex:none"></div>

  <div style="flex:1;padding:14px 24px 18px;display:flex;flex-direction:column;gap:14px;overflow:hidden">
    <div class="topline" style="margin-bottom:8px">
      <button onClick="location.href='./emotion-subcategory.html'" class="back" style="width:34px;height:34px;border:none;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px -6px rgba(140,100,200,.6);cursor:pointer;flex:none" type="button" aria-label="뒤로 가기"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8.5 2.5L4 7l4.5 4.5" stroke="#9A7FAD" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>
    <div style="display:flex;align-items:center;gap:8px;justify-content:center"><svg width="22" height="22" viewBox="0 0 24 24" fill="#FF7A9C"><path d="M12 2l1.8 6.2L20 10l-6.2 1.8L12 18l-1.8-6.2L4 10l6.2-1.8z"/></svg><span style="font:400 16px Jua,Pretendard;color:#C86B90">오늘의 마음 캐릭터</span></div>
    <div class="character-panel" style="background:#fff;border-radius:32px;padding:20px;text-align:center;position:relative;overflow:hidden;box-shadow:0 16px 34px -20px rgba(200,100,160,.6)">
      <div style="position:absolute;top:14px;left:20px;width:60px;height:60px;border-radius:50%;background:#FFE7EF"></div><div style="position:absolute;bottom:20px;right:18px;width:44px;height:44px;border-radius:50%;background:#EDE4FA"></div>
      <div style="animation:floaty 4s ease-in-out infinite;display:inline-block;position:relative">
        <svg width="130" height="152" viewBox="0 0 130 150" fill="none"><ellipse cx="65" cy="141" rx="42" ry="8" fill="#E8CFDD" opacity=".6"/><rect x="52" y="54" width="26" height="80" rx="13" fill="#E3B486"/><ellipse cx="65" cy="46" rx="31" ry="35" fill="#FF8A6B"/><ellipse cx="54" cy="32" rx="8" ry="10" fill="#fff" opacity=".4"/><circle cx="56" cy="47" r="3.6" fill="#4A3550"/><circle cx="76" cy="47" r="3.6" fill="#4A3550"/><path d="M56 60q4.5 4 9 0t9 0" stroke="#4A3550" stroke-width="2.6" fill="none" stroke-linecap="round"/><ellipse cx="47" cy="56" rx="5.5" ry="3.2" fill="#FF3E6E" opacity=".3"/><ellipse cx="83" cy="56" rx="5.5" ry="3.2" fill="#FF3E6E" opacity=".3"/><path d="M96 27q3.2 6.5 0 9.5a4.8 4.8 0 0 1 0-9.5z" fill="#8FD0EE"/><path d="M32 40q2.6 5.2 0 8a3.8 3.8 0 0 1 0-8z" fill="#8FD0EE"/></svg>
      </div>
      <h2 id="characterName" style="margin:4px 0 4px;font:400 26px Jua,Pretendard;color:#4A3550;position:relative">젖은 성냥</h2>
      <p style="margin:0;font:500 13px/1.5 Pretendard;color:#9A7FAD;position:relative">불붙고 싶은데 축축한 하루였구나.<br>괜찮아, 마르면 다시 켜져.</p>
    </div>
    <div style="background:linear-gradient(150deg,#A98BE8,#8FA8F0);border-radius:22px;padding:24px 20px 34px;color:#fff;min-height:220px;display:flex;flex-direction:column;justify-content:flex-start"><svg width="26" height="26" viewBox="0 0 24 24" fill="rgba(255,255,255,.9)" style="margin-bottom:8px"><path d="M10 7L7 13h3v4H4v-5l3-5zm10 0l-3 6h3v4h-6v-5l3-5z"/></svg><p style="margin:0 0 14px;font:400 17px/1.6 Jua,Pretendard">축축한 마음은 억지로 불붙이려고 하면 더 금방 꺼질 수 있어. 오늘은 네가 못난 게 아니라, 그냥 아직 덜 마른 거야. 잠깐 멈춰 서서 숨을 고르고, 너무 세게 흔들지 말고, 천천히 온도를 되찾아보자. 조금 말라가고 있다는 느낌만 와도 충분해. 그 다음엔 다시 붙을 수 있어. 오늘은 그 준비를 하는 날이야.</p><p style="margin:0;font:600 12px Pretendard;opacity:.85">— 마음 도사가</p></div>
  </div>
  <script>
    try {
      const characterName = document.getElementById('characterName');
      if (characterName && characterName.textContent.trim()) {
        localStorage.setItem('selectedMoodCharacter', characterName.textContent.trim());
      }
    } catch (e) { /* ignore storage errors */ }
  </script>
  <div style="padding:4px 24px 30px"><button class="action-btn" onClick="location.href='./mood-type.html'" style="border:none;width:100%;background:linear-gradient(90deg,#FF8A6B,#FF6F86);color:#fff;font:400 20px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:pointer;box-shadow:0 14px 28px -12px rgba(255,111,120,.8)">일기로 이어가기</button></div>
</div></body></html>
