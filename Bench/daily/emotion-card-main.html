<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>html,body{margin:0;min-height:100%;font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#f8f2ff}body{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px;box-sizing:border-box;overflow:auto}</style>
</head>
<body>
<div style="width:390px;min-height:844px;background:radial-gradient(130% 55% at 50% 6%,#FFDCD0,#FDF3FF 58%);border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);display:flex;flex-direction:column;color:#4A3550">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 30px 4px;font:600 15px Pretendard"><span>9:41</span><div style="display:flex;gap:7px;align-items:center"><svg width="18" height="12" viewBox="0 0 18 12" fill="#4A3550"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/></svg><svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3" fill="none" stroke="#4A3550" stroke-opacity=".4"/><rect x="3" y="3" width="15" height="7" rx="1.5" fill="#4A3550"/></svg></div></div>
  <div style="flex:1;padding:16px 24px 22px;display:flex;flex-direction:column">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div><p style="margin:0 0 5px;font:700 12px Pretendard;color:#A98BE8">오늘의 감정 카드</p><h1 style="margin:0;font:400 25px/1.3 Jua,Pretendard;color:#4A3550">오늘, 어떤 마음이었어?</h1><p style="margin:6px 0 0;font:500 13px Pretendard;color:#9A7FAD">가장 큰 갈래부터 골라보자</p></div>
      <span style="font:700 11px Pretendard;color:#fff;background:linear-gradient(90deg,#A98BE8,#FF8A6B);padding:6px 12px;border-radius:20px;flex:none;margin-top:4px">1개 선택</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:9px">
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><img src="../assets/05_emotion/anger.png" alt="분노" style="width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 7px"><span style="font:400 14px Jua,Pretendard;color:#6A5A78">분노</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><img src="../assets/05_emotion/surprise.png" alt="놀람" style="width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 7px"><span style="font:400 14px Jua,Pretendard;color:#6A5A78">놀람</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><img src="../assets/05_emotion/joy.png" alt="기쁨" style="width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 7px"><span style="font:400 14px Jua,Pretendard;color:#6A5A78">기쁨</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><img src="../assets/05_emotion/discomfort.png" alt="불편함" style="width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 7px"><span style="font:400 14px Jua,Pretendard;color:#6A5A78">불편함</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><img src="../assets/05_emotion/sadness.png" alt="슬픔" style="width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 7px"><span style="font:400 14px Jua,Pretendard;color:#6A5A78">슬픔</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><img src="../assets/05_emotion/fear.png" alt="두려움" style="width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 7px"><span style="font:400 14px Jua,Pretendard;color:#6A5A78">두려움</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><img src="../assets/05_emotion/lethargy.png" alt="무기력함" style="width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 7px"><span style="font:400 14px Jua,Pretendard;color:#6A5A78">무기력함</span></button>
    </div>
    <p style="margin:16px 0 0;font:500 12px Pretendard;color:#9A7FAD;text-align:center">마음에 가장 가까운 하나를 톡</p>
    <div style="flex:1"></div>
    <button id="mainNext" style="border:none;width:100%;background:linear-gradient(90deg,#A98BE8,#7FA8F0);color:#fff;font:400 20px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:pointer;box-shadow:0 14px 28px -12px rgba(120,100,220,.8);margin-top:14px">더 자세히 보기</button>
  </div>
  <div style="display:flex;justify-content:center;padding:8px 0 12px"><div style="width:130px;height:5px;border-radius:3px;background:#4A3550;opacity:.16"></div></div>
</div>
<script>
  const cards = [...document.querySelectorAll('button[data-active]')];
  const mainNext = document.getElementById('mainNext');

  const updateSelection = (selectedCard) => {
    cards.forEach((c) => {
      const active = c === selectedCard;
      c.dataset.active = String(active);
      c.style.border = active ? '2.5px solid #FFC24B' : 'none';
      c.style.boxShadow = active ? '0 8px 18px -12px rgba(255,180,60,.7)' : '0 8px 18px -16px rgba(140,100,200,.5)';
      c.style.transform = active ? 'translateY(-1px)' : 'translateY(0)';
      const label = c.querySelector('span');
      if (label) label.style.color = active ? '#4A3550' : '#6A5A78';
      if (active && label) {
        try { localStorage.setItem('selectedEmotionMain', label.textContent.trim()); } catch (e) {}
      }
    });

    if (mainNext) {
      mainNext.disabled = !selectedCard;
      mainNext.style.opacity = selectedCard ? '1' : '0.55';
      mainNext.style.cursor = selectedCard ? 'pointer' : 'not-allowed';
    }
  };

  cards.forEach((card) => card.addEventListener('click', () => {
    updateSelection(card);
  }));

  if (mainNext) {
    mainNext.addEventListener('click', (e) => {
      e.preventDefault();
      const active = cards.find((c) => c.dataset.active === 'true');
      const label = active ? active.querySelector('span') : null;
      const text = label ? label.textContent.trim() : null;

      if (!text) return;

      try { localStorage.setItem('selectedEmotionMain', text); } catch (err) {}
      location.href = './emotion-subcategory.html';
    });
  }

  updateSelection(null);
</script>
</body>
</html>
