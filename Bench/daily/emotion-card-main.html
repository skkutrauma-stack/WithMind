<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>html,body{margin:0;min-height:100%;font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#f8f2ff}body{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px;box-sizing:border-box;overflow:auto}</style>
</head>
<body>
<div style="width:390px;min-height:844px;background:radial-gradient(130% 55% at 50% 6%,#FFDCD0,#FDF3FF 58%);border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);display:flex;flex-direction:column;color:#4A3550">
  <div aria-hidden="true" style="height:35px;flex:none"></div>
  <div style="flex:1;padding:14px 24px 22px;display:flex;flex-direction:column">
    <div style="display:grid;grid-template-columns:1fr auto;column-gap:16px;align-items:start;padding-bottom:18px">
      <div>
        <p style="margin:0 0 5px;font:700 12px Pretendard;color:#A98BE8">오늘의 감정 카드</p>
        <h1 style="margin:0;font:400 30px/1.15 Jua,Pretendard;color:#4A3550">오늘, 어떤 마음이었어?</h1>
        <p style="margin:6px 0 0;font:500 13px Pretendard;color:#9A7FAD">가장 큰 갈래부터 골라보자</p>
      </div>
      <span style="font:700 11px Pretendard;color:#fff;background:linear-gradient(90deg,#A98BE8,#FF8A6B);padding:6px 12px;border-radius:20px;justify-self:end;align-self:start;margin-top:54px">1개 선택</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:9px">
      <button type="button" data-active="false" data-slug="anger" data-route="./emotion-subcategory-anger.html" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><img src="../assets/05_emotion/anger.png" alt="분노" style="width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 7px"><span style="font:400 14px Jua,Pretendard;color:#6A5A78">분노</span></button>
      <button type="button" data-active="false" data-slug="surprise" data-route="./emotion-subcategory-surprise.html" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><img src="../assets/05_emotion/surprise.png" alt="놀람" style="width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 7px"><span style="font:400 14px Jua,Pretendard;color:#6A5A78">놀람</span></button>
      <button type="button" data-active="false" data-slug="joy" data-route="./emotion-subcategory-joy.html" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><img src="../assets/05_emotion/joy.png" alt="기쁨" style="width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 7px"><span style="font:400 14px Jua,Pretendard;color:#6A5A78">기쁨</span></button>
      <button type="button" data-active="false" data-slug="discomfort" data-route="./emotion-subcategory-discomfort.html" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><img src="../assets/05_emotion/discomfort.png" alt="불편함" style="width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 7px"><span style="font:400 14px Jua,Pretendard;color:#6A5A78">불편함</span></button>
      <button type="button" data-active="false" data-slug="sadness" data-route="./emotion-subcategory-sadness.html" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><img src="../assets/05_emotion/sadness.png" alt="슬픔" style="width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 7px"><span style="font:400 14px Jua,Pretendard;color:#6A5A78">슬픔</span></button>
      <button type="button" data-active="false" data-slug="fear" data-route="./emotion-subcategory-fear.html" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><img src="../assets/05_emotion/fear.png" alt="두려움" style="width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 7px"><span style="font:400 14px Jua,Pretendard;color:#6A5A78">두려움</span></button>
      <button type="button" data-active="false" data-slug="apathy" data-route="./emotion-subcategory-apathy.html" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><img src="../assets/05_emotion/lethargy.png" alt="무기력함" style="width:36px;height:36px;object-fit:contain;display:block;margin:0 auto 7px"><span style="font:400 14px Jua,Pretendard;color:#6A5A78">무기력함</span></button>
    </div>
    <p style="margin:16px 0 0;font:500 12px Pretendard;color:#9A7FAD;text-align:center">마음에 가장 가까운 하나를 톡</p>
    <div style="flex:1"></div>
    <button id="mainNext" disabled style="border:none;width:100%;background:linear-gradient(90deg,#A98BE8,#7FA8F0);color:#fff;font:400 20px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:not-allowed;box-shadow:none;margin-top:14px;opacity:.55">더 자세히 보기</button>
  </div>
</div>
<script>
  const cards = [...document.querySelectorAll('button[data-active]')];
  const mainNext = document.getElementById('mainNext');

  const updateSelection = (selectedCard) => {
    cards.forEach((c) => {
      const active = c === selectedCard;
      c.dataset.active = String(active);
      c.style.border = active ? '2.5px solid #FFC24B' : 'none';
      c.style.boxShadow = active ? '0 8px 18px -12px rgba(255,180,60,.7)' : '0 8px 18px -16px rgba(140,100,200,.5)';
      c.style.transform = active ? 'translateY(-1px)' : 'translateY(0)';
      const label = c.querySelector('span');
      if (label) label.style.color = active ? '#4A3550' : '#6A5A78';
      if (active && label) {
        try {
          localStorage.setItem('selectedEmotionMain', label.textContent.trim());
          localStorage.setItem('selectedEmotionMainSlug', c.dataset.slug || '');
        } catch (e) {}
      }
    });

    if (mainNext) {
      mainNext.disabled = !selectedCard;
      mainNext.style.opacity = selectedCard ? '1' : '0.55';
      mainNext.style.cursor = selectedCard ? 'pointer' : 'not-allowed';
      mainNext.dataset.route = selectedCard ? selectedCard.dataset.route : '';
    }
  };

  cards.forEach((card) => card.addEventListener('click', () => {
    updateSelection(card);
  }));

  if (mainNext) {
    mainNext.addEventListener('click', (e) => {
      e.preventDefault();
      if (mainNext.disabled) return;
      const route = mainNext.dataset.route;
      if (!route) return;
      location.href = route;
    });
  }

  updateSelection(null);
</script>
</body>
</html>
