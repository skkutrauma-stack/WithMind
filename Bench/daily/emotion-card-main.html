<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>html,body{margin:0;min-height:100%;font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#f8f2ff}body{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:24px;box-sizing:border-box;overflow:auto}</style>
</head>
<body>
<div style="width:390px;min-height:844px;background:radial-gradient(130% 55% at 50% 6%,#FFDCD0,#FDF3FF 58%);border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);display:flex;flex-direction:column;color:#4A3550">
  <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 30px 4px;font:600 15px Pretendard"><span>9:41</span><div style="display:flex;gap:7px;align-items:center"><svg width="18" height="12" viewBox="0 0 18 12" fill="#4A3550"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="5" y="5" width="3" height="7" rx="1"/><rect x="10" y="2" width="3" height="10" rx="1"/></svg><svg width="26" height="13" viewBox="0 0 26 13"><rect x="1" y="1" width="21" height="11" rx="3" fill="none" stroke="#4A3550" stroke-opacity=".4"/><rect x="3" y="3" width="15" height="7" rx="1.5" fill="#4A3550"/></svg></div></div>
  <div style="flex:1;padding:16px 24px 22px;display:flex;flex-direction:column">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px">
      <div><p style="margin:0 0 5px;font:700 12px Pretendard;color:#A98BE8">오늘의 감정 카드</p><h1 style="margin:0;font:400 25px/1.3 Jua,Pretendard;color:#4A3550">오늘, 어떤 마음이었어?</h1><p style="margin:6px 0 0;font:500 13px Pretendard;color:#9A7FAD">가장 큰 갈래부터 골라보자</p></div>
      <span style="font:700 11px Pretendard;color:#fff;background:linear-gradient(90deg,#A98BE8,#FF8A6B);padding:6px 12px;border-radius:20px;flex:none;margin-top:4px">1개 선택</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:9px">
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><div style="width:36px;height:36px;border-radius:50%;background:#F07A5A;margin:0 auto 7px;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M7.2 8.4c.8-.8 1.6-1.1 2.5-1.1.8 0 1.6.3 2.5 1.1" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/><path d="M13.2 8.4c.8-.8 1.6-1.1 2.5-1.1.8 0 1.6.3 2.5 1.1" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/><path d="M7.5 14.8c2.2-1.7 4.4-2.4 6.7-2.4 2.2 0 4.4.7 6.7 2.4" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></div><span style="font:400 14px Jua,Pretendard;color:#6A5A78">분노</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><div style="width:36px;height:36px;border-radius:50%;background:#FFC24B;margin:0 auto 7px;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="8.6" cy="10" r="1.4" fill="#fff"/><circle cx="15.4" cy="10" r="1.4" fill="#fff"/><path d="M8 14.8c1.4 1.3 2.7 1.9 4 1.9 1.3 0 2.6-.6 4-1.9" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></div><span style="font:400 14px Jua,Pretendard;color:#6A5A78">놀람</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><div style="width:36px;height:36px;border-radius:50%;background:#FFC24B;margin:0 auto 7px;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="9" cy="10" r="1.4" fill="#fff"/><circle cx="15" cy="10" r="1.4" fill="#fff"/><path d="M8.5 14q3.5 3 7 0" stroke="#fff" stroke-width="1.8" fill="none" stroke-linecap="round"/></svg></div><span style="font:400 14px Jua,Pretendard;color:#6A5A78">기쁨</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><div style="width:36px;height:36px;border-radius:50%;background:#7FD0BE;margin:0 auto 7px;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="8.6" cy="10" r="1.4" fill="#fff"/><circle cx="15.4" cy="10" r="1.4" fill="#fff"/><path d="M8.2 14.3c1.6 1.2 3.2 1.8 4.8 1.8 1.6 0 3.2-.6 4.8-1.8" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></div><span style="font:400 14px Jua,Pretendard;color:#6A5A78">불편함</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><div style="width:36px;height:36px;border-radius:50%;background:#6FA8E0;margin:0 auto 7px;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="8.6" cy="10" r="1.4" fill="#fff"/><circle cx="15.4" cy="10" r="1.4" fill="#fff"/><path d="M8.2 14.6c1.6 1.4 3.1 2.1 4.8 2.1 1.7 0 3.2-.7 4.8-2.1" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></div><span style="font:400 14px Jua,Pretendard;color:#6A5A78">슬픔</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><div style="width:36px;height:36px;border-radius:50%;background:#B8A6F0;margin:0 auto 7px;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="8.6" cy="10" r="1.4" fill="#fff"/><circle cx="15.4" cy="10" r="1.4" fill="#fff"/><path d="M8.2 14.3c2 1.1 3.8 1.7 5.8 1.7 2 0 3.8-.6 5.8-1.7" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></div><span style="font:400 14px Jua,Pretendard;color:#6A5A78">두려움</span></button>
      <button type="button" data-active="false" style="border:none;background:#fff;border-radius:22px;padding:14px 6px;text-align:center;box-shadow:0 8px 18px -16px rgba(140,100,200,.5);cursor:pointer"><div style="width:36px;height:36px;border-radius:50%;background:#B0A79E;margin:0 auto 7px;display:flex;align-items:center;justify-content:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="8.6" cy="10" r="1.4" fill="#fff"/><circle cx="15.4" cy="10" r="1.4" fill="#fff"/><path d="M8.2 14.3c1 1.2 2.2 1.8 3.4 1.8 1.2 0 2.4-.6 3.4-1.8" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></div><span style="font:400 14px Jua,Pretendard;color:#6A5A78">무기력함</span></button>
    </div>
    <p style="margin:16px 0 0;font:500 12px Pretendard;color:#9A7FAD;text-align:center">마음에 가장 가까운 하나를 톡</p>
    <div style="flex:1"></div>
    <button id="mainNext" style="border:none;width:100%;background:linear-gradient(90deg,#A98BE8,#7FA8F0);color:#fff;font:400 20px Jua,Pretendard;padding:16px 0;border-radius:22px;cursor:pointer;box-shadow:0 14px 28px -12px rgba(120,100,220,.8);margin-top:14px">더 자세히 보기</button>
  </div>
  <div style="display:flex;justify-content:center;padding:8px 0 12px"><div style="width:130px;height:5px;border-radius:3px;background:#4A3550;opacity:.16"></div></div>
</div>
<script>
  const cards = [...document.querySelectorAll('button[data-active]')];
  cards.forEach((card) => card.addEventListener('click', () => {
    cards.forEach((c) => {
      const active = c === card;
      c.dataset.active = String(active);
      c.style.border = active ? '2.5px solid #FFC24B' : 'none';
      c.style.boxShadow = active ? '0 8px 18px -12px rgba(255,180,60,.7)' : '0 8px 18px -16px rgba(140,100,200,.5)';
      c.style.transform = active ? 'translateY(-1px)' : 'translateY(0)';
      const label = c.querySelector('span');
      if (label) label.style.color = active ? '#4A3550' : '#6A5A78';
      // persist main selection immediately so other pages can read it
      if (active && label) {
        try { localStorage.setItem('selectedEmotionMain', label.textContent.trim()); } catch (e) {}
      }
    });
  }));

  // Save selected main emotion before navigating
  const mainNext = document.getElementById('mainNext');
  if (mainNext) {
    mainNext.addEventListener('click', (e) => {
      e.preventDefault();
      const active = cards.find((c) => c.dataset.active === 'true');
      const label = active ? active.querySelector('span') : null;
      const text = label ? label.textContent.trim() : null;
      try { if (text) localStorage.setItem('selectedEmotionMain', text); } catch (err) {}
      location.href = './emotion-subcategory.html';
    });
  }
</script>
</body>
</html>
