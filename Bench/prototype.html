<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bench Prototype</title>
<style>
  html,body{height:100%;margin:0;background:#FFF9FE;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center}
  .shell{
    width:390px;
    height:844px;
    max-width:100vw;
    max-height:100vh;
    background:#FFF9FE;
    position:relative;
    overflow:hidden;
    border-radius:46px;
    box-shadow:0 26px 64px -22px rgba(120,70,120,.24);
  }
  .frame{
    width:100%;
    height:100%;
    border:0;
    display:block;
    background:#FFF9FE;
    overflow:hidden;
  }
</style>
</head>
<body>
  <div class="shell">
    <iframe id="frame" class="frame" title="Prototype screen" scrolling="no"></iframe>
  </div>

  <script>
    const flow = [
      './onboarding/landing.html',
      './onboarding/welcome.html',
      './onboarding/account.html',
      './onboarding/profile.html',
      './onboarding/agreement.html',
      './onboarding/alert.html',
      './onboarding/safety_contact.html',
      './home/home.html',
      './daily/emotion-card-main.html',
      './daily/emotion-subcategory.html',
      './daily/checkin.html',
      './daily/mood-character.html',
      './daily/mood-type.html',
      './daily/hardness-check.html',
      './daily/help-popup.html',
      './daily/journal.html',
      './daily/ai-comment.html',
      './record/emotion.html',
      './record/journal.html',
      './record/baseline.html',
      './safetyplan/home.html',
      './safetyplan/plan.html',
      './safetyplan/crisis.html',
      './etc/settings.html',
      './etc/feedback.html'
    ];
  const frame = document.getElementById('frame');
  let current = 0;
  const resolvedFlow = flow.map((path) => new URL(path, document.baseURI).pathname.replace(/\\/g, '/'));

  function getFramePath() {
    try {
      return new URL(frame.contentWindow.location.href).pathname.replace(/\\/g, '/');
    } catch (error) {
      try {
        return new URL(frame.src, document.baseURI).pathname.replace(/\\/g, '/');
      } catch (innerError) {
        return '';
      }
    }
  }

  function syncCurrentFromFrame() {
    const framePath = getFramePath();
    const matchIndex = resolvedFlow.findIndex((path) => framePath.endsWith(path));
    if (matchIndex >= 0) {
      current = matchIndex;
    }
  }

  function setScreen(index) {
    current = Math.max(0, Math.min(index, flow.length - 1));
    frame.src = flow[current];
  }

  frame.addEventListener('load', () => {
    try {
      syncCurrentFromFrame();
      const doc = frame.contentDocument;
      if (!doc || !doc.documentElement || !doc.body) return;
      const isOnboarding = flow[current].includes('/onboarding/');
        doc.documentElement.style.margin = '0';
        doc.documentElement.style.padding = '0';
        doc.documentElement.style.width = '100%';
        doc.documentElement.style.minHeight = '100%';
        doc.documentElement.style.overflow = 'hidden';
        doc.documentElement.style.background = 'transparent';
        doc.body.style.margin = '0';
        doc.body.style.padding = '0';
        doc.body.style.width = '100%';
        doc.body.style.minHeight = '100%';
        doc.body.style.display = 'block';
        doc.body.style.overflow = 'hidden';
        doc.body.style.background = 'transparent';
        doc.body.style.boxSizing = 'border-box';
        const root = doc.getElementById('dc-root');
        if (root) {
          root.style.boxSizing = 'border-box';
          root.style.margin = '0';
          root.style.background = 'transparent';
          root.style.overflow = 'hidden';
          if (isOnboarding) {
            root.style.width = 'calc(100% + 64px)';
            root.style.height = 'calc(100% + 64px)';
            root.style.transform = 'translate(-32px, -32px)';
          } else {
            root.style.width = '100%';
            root.style.height = '100%';
            root.style.transform = 'none';
          }
        }
      } catch (error) {
        // Ignore cross-document timing quirks while the frame swaps screens.
      }
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'ArrowRight') setScreen(current + 1);
      if (event.key === 'ArrowLeft') setScreen(current - 1);
    });

    setScreen(0);
  </script>
</body>
</html>
