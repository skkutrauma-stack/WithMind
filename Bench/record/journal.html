<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  body{margin:0;background:radial-gradient(130% 45% at 30% 0%,#F4DDE5,#FDF3FF 55%);font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;justify-content:center;align-items:center;min-height:100vh}
  .page-shell{animation:pageIn .24s ease-out both}
  @keyframes pageIn{from{transform:translateX(18px);opacity:0}to{transform:translateX(0);opacity:1}}
  .nav-btn{cursor:pointer;user-select:none}
  .nav-btn.left-out{animation:slideLeft .22s ease-in forwards}
  @keyframes slideLeft{to{transform:translateX(-18px);opacity:0}}
  .month-picker{position:relative;width:max-content}
  .month-select{appearance:none;-webkit-appearance:none;-moz-appearance:none;border:0;background:#fff;padding:10px 38px 10px 16px;border-radius:18px;box-shadow:0 8px 20px rgba(140,100,200,.12);font:400 15px Jua,Pretendard;color:#4A3550;cursor:pointer;outline:none}
  .month-picker::after{content:"⌄";position:absolute;right:16px;top:50%;transform:translateY(-52%);pointer-events:none;color:#9A7FAD;font:400 15px Jua,Pretendard}
</style>
<script>
  function goWithSlide(el, href, dir){
    if(!el || el.classList.contains('is-exiting')) return;
    el.classList.add('is-exiting', dir === 'right' ? 'right-out' : 'left-out');
    setTimeout(function(){ location.href = href; }, 170);
  }
</script>
</head>
<body>
<x-dc>

    <div style="display:flex;background:#F3DEE9;border-radius:18px;padding:4px"><div class="nav-btn" onclick="goWithSlide(this,'./emotion.html','left')" style="flex:1;text-align:center;color:#9A7FAD;font:400 15px Jua,Pretendard;padding:11px 0;cursor:pointer">EMA</div><div class="nav-btn" onclick="goWithSlide(this,'./journal.html','left')" style="flex:1;text-align:center;background:linear-gradient(90deg,#FF8FB0,#A98BE8);color:#fff;font:400 15px Jua,Pretendard;padding:11px 0;border-radius:14px">EMI</div><div class="nav-btn" onclick="goWithSlide(this,'./baseline.html','right')" style="flex:1;text-align:center;color:#9A7FAD;font:400 15px Jua,Pretendard;padding:11px 0;cursor:pointer">Baseline</div></div>

A. 아마 서로 더 어색해졌을 것 같아.

    </div>
  </div>
  <div style="display:flex;justify-content:space-around;align-items:center;padding:12px 16px 8px;background:rgba(255,255,255,.75);border-top:1px solid #F0E4F5">
    <a href="../home/home.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;text-decoration:none;color:inherit"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M4 11L12 4l8 7M6 10v9h12v-9" stroke="#C6B4D4" stroke-width="1.7" stroke-linejoin="round"/></svg><span style="font:600 10px Pretendard;color:#C6B4D4">홈</span></a>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px"><svg width="24" height="24" viewBox="0 0 24 24" fill="#A98BE8"><path d="M6 5h9a2 2 0 0 1 2 2v12H8a2 2 0 0 0-2 2z" opacity=".2"/><path d="M6 5h9a2 2 0 0 1 2 2v12H8a2 2 0 0 0-2 2z" stroke="#A98BE8" stroke-width="1.7" fill="none" stroke-linejoin="round"/></svg><span style="font:600 10px Pretendard;color:#A98BE8">기록</span></div>

    <a href="../safetyplan/home.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;text-decoration:none;color:inherit"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 20C5 15 4 9 7.5 7.5S12 9 12 9s1-2.6 4.5-1.5S19 15 12 20z" stroke="#C6B4D4" stroke-width="1.7" stroke-linejoin="round"/></svg><span style="font:600 10px Pretendard;color:#C6B4D4">SOS</span></a>
  </div>
</div>
