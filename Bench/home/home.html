<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  html,body{width:100%;height:100%;margin:0;overflow:hidden}
  .tap-card{transition:transform .16s ease, box-shadow .16s ease, filter .16s ease}
  .tap-card:hover{transform:translateY(-2px) scale(1.01);filter:saturate(1.04)}
  .tap-card:active{transform:translateY(0) scale(.99)}
  .primary-btn{transition:transform .16s ease, box-shadow .16s ease, filter .16s ease}
  .primary-btn:hover{transform:translateY(-2px) scale(1.01);box-shadow:0 18px 34px -14px rgba(120,100,220,.8);filter:saturate(1.05)}
  .primary-btn:active{transform:translateY(0) scale(.99);box-shadow:0 12px 22px -14px rgba(120,100,220,.65)}
  .nav-item{transition:transform .16s ease, color .16s ease, opacity .16s ease}
  .nav-item:hover{transform:translateY(-1px)}
  .nav-item:active{transform:translateY(0) scale(.98)}
  .nav-item.active span{color:#A98BE8}
  .nav-item.active svg{fill:#A98BE8}
  body{display:flex;align-items:center;justify-content:center;background:radial-gradient(140% 60% at 80% 0%,#FFE2D0,#FDF3FF 55%);font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  .phone{width:390px;height:844px;background:radial-gradient(140% 60% at 80% 0%,#FFE2D0,#FDF3FF 55%);border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);display:flex;flex-direction:column;color:#4A3550;font-family:Pretendard}
</style>
</head>
<body>
<div class="phone">
  <div aria-hidden="true" style="height:35px;flex:none"></div>
  <div style="flex:1;padding:14px 26px 26px;display:flex;flex-direction:column;gap:18px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><p style="margin:0 0 6px;font:600 13px Pretendard;color:#B08FC0">7월 10일 금요일</p><h1 style="margin:0;font:400 30px/1.15 Jua,Pretendard;color:#4A3550">지우야,<br>오늘 어때?</h1></div>
      <div onClick="location.href='../etc/settings.html'" style="width:48px;height:48px;border-radius:20px;background:#fff;display:flex;align-items:center;justify-content:center;flex:none;box-shadow:0 6px 14px -6px rgba(140,100,200,.5);cursor:pointer"><svg width="26" height="26" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="9" r="4" fill="#A98BE8"/><path d="M4.5 20c1-4 4-6 7.5-6s6.5 2 7.5 6" fill="#A98BE8"/></svg></div>
    </div>
    <div class="tap-card" style="background:#fff;border-radius:26px;padding:18px 20px;box-shadow:0 10px 26px -16px rgba(140,100,200,.4)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font:400 17px Jua,Pretendard;color:#4A3550">이번 주 <span style="color:#FF7A6B">4번</span></span><span style="font:600 12px Pretendard;color:#7A63C8;background:#EDE7FB;padding:5px 11px;border-radius:20px">좋은 흐름이야</span></div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:26px;height:26px;border-radius:50%;background:#FF9E7A"></div><span style="font:600 11px Pretendard;color:#B08FC0">월</span></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:26px;height:26px;border-radius:50%;background:#FFBE6B"></div><span style="font:600 11px Pretendard;color:#B08FC0">화</span></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:26px;height:26px;border-radius:50%;background:#EDE7FB"></div><span style="font:600 11px Pretendard;color:#B08FC0">수</span></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:26px;height:26px;border-radius:50%;background:#7FC8F0"></div><span style="font:600 11px Pretendard;color:#B08FC0">목</span></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:26px;height:26px;border-radius:50%;background:#A98BE8"></div><span style="font:600 11px Pretendard;color:#B08FC0">금</span></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:26px;height:26px;border-radius:50%;background:#F0E9F7"></div><span style="font:600 11px Pretendard;color:#CFC0DE">토</span></div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px"><div style="width:26px;height:26px;border-radius:50%;background:#F0E9F7"></div><span style="font:600 11px Pretendard;color:#CFC0DE">일</span></div>
      </div>
    </div>
    <div style="background:linear-gradient(150deg,#A98BE8,#7FA8F0);border-radius:32px;padding:26px 24px;color:#fff;position:relative;overflow:hidden;box-shadow:0 18px 36px -14px rgba(120,100,220,.7)">
      <div style="position:absolute;top:-30px;right:-20px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.14)"></div>
      <div style="position:absolute;bottom:-40px;left:-24px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.1)"></div>
      <div style="display:flex;align-items:center;gap:9px;margin-bottom:12px;position:relative"><svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M20 13a8 8 0 1 1-9-9 6.5 6.5 0 0 0 9 9z"/></svg><span style="font:600 13px Pretendard;opacity:.95">오늘의 저녁 세션</span></div>
      <h2 style="margin:0 0 6px;font:400 24px/1.25 Jua,Pretendard;position:relative">감정카드부터<br>일기까지</h2>
      <p style="margin:0 0 18px;font:500 13px Pretendard;opacity:.92;position:relative">약 5분이면 돼</p>
      <button class="primary-btn" onClick="location.href='../daily/emotion-card-main.html'" style="border:none;background:#fff;color:#7A63C8;font:400 18px Jua,Pretendard;padding:14px 0;width:100%;border-radius:20px;cursor:pointer;position:relative">시작하기</button>
    </div>
    <div class="tap-card" onClick="location.href='../record/emotion.html'" style="background:#fff;border-radius:24px;padding:16px 18px;display:flex;align-items:center;gap:14px;box-shadow:0 10px 24px -18px rgba(140,100,200,.5);cursor:pointer">
      <div style="width:46px;height:46px;border-radius:16px;background:#EAF6FF;display:flex;align-items:center;justify-content:center;flex:none"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M5 4h9a3 3 0 0 1 3 3v13H8a3 3 0 0 0-3 3z" stroke="#5AB0E8" stroke-width="1.8" stroke-linejoin="round"/><path d="M19 4v16" stroke="#5AB0E8" stroke-width="1.8"/></svg></div>
      <div style="flex:1"><p style="margin:0 0 3px;font:600 11px Pretendard;color:#B08FC0">지난 일기 다시 보기</p><p style="margin:0;font:400 16px Jua,Pretendard;color:#4A3550">어제 · 답답함, 서운함</p></div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#CFC0DE" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </div>
  <div style="display:flex;justify-content:space-around;align-items:center;padding:12px 16px 8px;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);border-top:1px solid #F0E4F5">
    <div class="nav-item active" onClick="location.href='./home.html'" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer"><svg width="24" height="24" viewBox="0 0 24 24" fill="#A98BE8"><path d="M4 11L12 4l8 7v9H4z" opacity=".2"/><path d="M4 11L12 4l8 7M6 10v9h12v-9" stroke="#A98BE8" stroke-width="1.8" fill="none" stroke-linejoin="round"/></svg><span style="font:600 10px Pretendard;color:#A98BE8">홈</span></div>
    <div class="nav-item" onClick="location.href='../record/emotion.html'" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M6 5h9a2 2 0 0 1 2 2v12H8a2 2 0 0 0-2 2z" stroke="#C6B4D4" stroke-width="1.7" stroke-linejoin="round"/></svg><span style="font:600 10px Pretendard;color:#C6B4D4">기록</span></div>
    <div class="nav-item active" onClick="location.href='../update.html'" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer"><svg width="24" height="24" viewBox="0 0 24 24" fill="#A98BE8"><path d="M5 6h14a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-6l-4 3v-3H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z" opacity=".2"/><path d="M5 6h14a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-6l-4 3v-3H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z" stroke="#A98BE8" stroke-width="1.7" fill="none" stroke-linejoin="round"/></svg><span style="font:600 10px Pretendard;color:#A98BE8">챗봇</span></div>
    <div class="nav-item" onClick="location.href='../safetyplan/home.html'" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 20C5 15 4 9 7.5 7.5S12 9 12 9s1-2.6 4.5-1.5S19 15 12 20z" stroke="#C6B4D4" stroke-width="1.7" stroke-linejoin="round"/></svg><span style="font:600 10px Pretendard;color:#C6B4D4">SOS</span></div>
  </div>
</div>
</body>
</html>
