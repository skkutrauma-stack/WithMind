<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFF9FE">
  <title>업데이트 예정</title>
  <style>
    :root {
      color-scheme: light;
      --canvas-top: #fff9fe;
      --canvas-bottom: #f5f6ff;
      --ink: #4a3550;
      --muted: #b08ac2;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; min-height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      background: #eee9e7;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .screen {
      position: relative;
      width: min(100%, 430px);
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 94% 7%, rgba(237, 228, 250, 0.58) 0, rgba(237, 228, 250, 0) 28%),
        radial-gradient(circle at 8% 93%, rgba(226, 239, 253, 0.6) 0, rgba(226, 239, 253, 0) 30%),
        linear-gradient(180deg, var(--canvas-top) 0%, #fbf8fd 62%, var(--canvas-bottom) 100%);
      isolation: isolate;
    }
    .content {
      position: relative;
      z-index: 1;
      display: flex;
      min-height: calc(100vh - 35px);
      min-height: calc(100svh - 35px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transform: translateY(-64px);
      text-align: center;
    }
    .logo {
      width: 122px;
      height: 122px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 18px 34px rgba(126,99,200,.12));
    }
    .title {
      margin: 30px 0 0;
      font-size: 23px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.045em;
    }
    .desc {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.45;
      letter-spacing: -0.025em;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .brand {
      position: absolute;
      z-index: 1;
      bottom: max(66px, calc(env(safe-area-inset-bottom) + 32px));
      left: 50%;
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.02em;
      transform: translateX(-50%);
    }
      @media (min-width: 431px) {
      .screen { box-shadow: 0 24px 70px rgba(61, 43, 67, 0.16); }
    }
    .back-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255,255,255,.78);
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: calc(env(safe-area-inset-top) + 14px);
      left: 18px;
      z-index: 2;
      text-decoration: none;
      box-shadow: 0 8px 18px -14px rgba(72,75,104,.35);
    }
  </style>
</head>
<body>
  <main class="screen" aria-labelledby="title" aria-describedby="desc">
    <div aria-hidden="true" style="height:35px;flex:none"></div>
    <a class="back-btn" href="javascript:history.back()" aria-label="뒤로가기">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 6l-6 6 6 6" stroke="#8187A4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <section class="content" role="status" aria-live="polite" aria-atomic="true">
      <img class="logo" src="./assets/01_logo/logo_app_icon_preview_1024.png" alt="">
      <h1 class="title" id="title">업데이트 예정</h1>
      <p class="desc" id="desc">준비 중인 페이지</p>
      <span class="sr-only">개발중 페이지</span>
    </section>
    <p class="brand">마음결</p>
  </main>
</body>
</html>
