<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#FFF9FE">
  <title>마음곁 · 불러오는 중</title>
  <style>
    :root {
      color-scheme: light;
      --canvas-top: #fff9fe;
      --canvas-bottom: #f5f6ff;
      --lavender: #c4b3ee;
      --lavender-deep: #7a63c8;
      --lavender-mid: #a98be8;
      --sky: #7fa8f0;
      --coral: #ff9b86;
      --ink: #4a3550;
      --muted: #b08ac2;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      background: #eee9e7;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .loading-screen {
      position: relative;
      width: min(100%, 430px);
      min-height: 100vh;
      min-height: 100svh;
      overflow: hidden;
      color: var(--ink);
      background:
        radial-gradient(circle at 94% 7%, rgba(237, 228, 250, 0.58) 0, rgba(237, 228, 250, 0) 28%),
        radial-gradient(circle at 8% 93%, rgba(226, 239, 253, 0.6) 0, rgba(226, 239, 253, 0) 30%),
        linear-gradient(180deg, var(--canvas-top) 0%, #fbf8fd 62%, var(--canvas-bottom) 100%);
      isolation: isolate;
    }

    .loading-content {
      position: relative;
      z-index: 1;
      display: flex;
      min-height: calc(100vh - 35px);
      min-height: calc(100svh - 35px);
      flex-direction: column;
      align-items: center;
      padding-top: calc(clamp(184px, 27.6svh, 260px) - 35px);
      text-align: center;
    }

    /* The logo is intentionally static. Only the dots below are animated. */
    .logo-tile {
      position: relative;
      width: 120px;
      height: 120px;
      flex: 0 0 auto;
      border-radius: 29px;
      background: var(--lavender);
      box-shadow: 0 18px 38px rgba(90, 65, 120, 0.11);
    }

    .pebble {
      position: absolute;
      display: block;
      border-radius: 999px;
    }

    .pebble--large {
      top: 36px;
      left: 34px;
      width: 31px;
      height: 55px;
      background: #fff9fe;
      transform: rotate(-2deg);
    }

    .pebble--small {
      top: 42px;
      left: 70px;
      width: 22px;
      height: 38px;
      background: var(--coral);
      transform: rotate(2deg);
    }

    .loading-title {
      margin: 50px 0 0;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -0.045em;
    }

    .loading-description {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 15px;
      font-weight: 500;
      line-height: 1.45;
      letter-spacing: -0.025em;
    }

    .loading-dots {
      display: flex;
      align-items: center;
      gap: 17px;
      margin-top: 38px;
    }

    .loading-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      opacity: 0.28;
      animation: dot-brightness 900ms ease-in-out infinite;
    }

    .loading-dot:nth-child(1) {
      background: var(--lavender-deep);
      animation-delay: 0ms;
    }

    .loading-dot:nth-child(2) {
      background: var(--lavender-mid);
      animation-delay: 300ms;
    }

    .loading-dot:nth-child(3) {
      background: var(--sky);
      animation-delay: 600ms;
    }

    @keyframes dot-brightness {
      0%, 18% {
        opacity: 1;
        filter: brightness(1.05);
      }
      38%, 100% {
        opacity: 0.28;
        filter: brightness(1);
      }
    }

    .brand-name {
      position: absolute;
      z-index: 1;
      bottom: max(66px, calc(env(safe-area-inset-bottom) + 32px));
      left: 50%;
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: -0.02em;
      transform: translateX(-50%);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      .loading-dot {
        opacity: 0.64;
        animation: none;
        filter: none;
      }
    }

    @media (min-width: 431px) {
      .loading-screen {
        box-shadow: 0 24px 70px rgba(61, 43, 67, 0.16);
      }
    }
  </style>
</head>
<body>
  <main class="loading-screen" aria-labelledby="loading-title" aria-describedby="loading-description">
    <div aria-hidden="true" style="height:35px;flex:none"></div>

    <section class="loading-content" role="status" aria-live="polite" aria-atomic="true">
      <div class="logo-tile" aria-hidden="true">
        <span class="pebble pebble--large"></span>
        <span class="pebble pebble--small"></span>
      </div>

      <h1 class="loading-title" id="loading-title">준비하고 있어</h1>
      <p class="loading-description" id="loading-description">잠시만 기다려줘</p>

      <div class="loading-dots" aria-hidden="true">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
      </div>

      <span class="sr-only">불러오는 중</span>
    </section>

    <p class="brand-name">마음곁</p>
  </main>
</body>
</html>
