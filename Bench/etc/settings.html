<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="../support.js?v=2"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  html,body{width:100%;height:100%;margin:0;overflow:hidden}
  body{background:radial-gradient(120% 40% at 50% 0%,#E7DFFF,#FDF3FF 52%);font-family:Pretendard,system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;justify-content:flex-start;align-items:flex-start}
  #dc-root, #dc-root > .sc-host{width:100vw !important;height:100vh !important;margin:0 !important;padding:0 !important;position:fixed !important;inset:0 !important;overflow:hidden !important}
  button,select{font:inherit}
  .screen{width:390px;height:844px;background:radial-gradient(120% 40% at 50% 0%,#E7DFFF,#FDF3FF 52%);border-radius:46px;overflow:hidden;position:relative;box-shadow:0 26px 64px -22px rgba(120,70,120,.4);display:flex;flex-direction:column;color:#4A3550}
  .content{flex:1;padding:10px 22px 12px;display:flex;flex-direction:column;gap:12px;min-height:0}
  .setting-card{background:#fff;border-radius:22px;box-shadow:0 10px 24px -20px rgba(140,100,200,.6);overflow:hidden}
  .setting-row{width:100%;border:0;background:#fff;color:#4A3550;display:flex;align-items:center;justify-content:space-between;padding:14px 16px;cursor:pointer;text-align:left}
  .setting-row:active{background:#FAF7FD}
  .setting-row + .setting-row{border-top:1px solid #F0E9FB}
  .setting-label{display:flex;align-items:center;gap:12px;min-width:0}
  .setting-icon{width:32px;height:32px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .switch{width:42px;height:24px;border-radius:14px;background:#DED6E8;position:relative;transition:background .18s ease;flex:none}
  .switch-knob{position:absolute;left:3px;top:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 2px 6px rgba(70,45,85,.18);transition:transform .18s ease}
  .switch.is-on{background:#A98BE8}
  .switch.is-on .switch-knob{transform:translateX(18px)}
  .nav-item{transition:transform .16s ease, opacity .16s ease, color .16s ease;outline:none;-webkit-tap-highlight-color:transparent;background:transparent;border:0;box-shadow:none;appearance:none;-webkit-appearance:none;user-select:none}
  .nav-item:active{transform:translateY(0) scale(.98)}
  .nav-item svg,.nav-item span{pointer-events:none}
</style>
<script>
  document.documentElement.dataset.scHoverScope = 'off';
  function go(url){ location.href = url; }
  if (window.top === window) {
    const style = document.createElement('style');
    style.textContent = `
      html, body { width: 100vw !important; height: 100vh !important; margin: 0 !important; overflow: hidden !important; }
      body { display: block !important; }
      #dc-root { position: fixed !important; inset: 0 !important; width: 100vw !important; height: 100vh !important; margin: 0 !important; transform: none !important; }
      #dc-root > .sc-host { position: relative !important; width: 100% !important; height: 100% !important; margin: 0 !important; transform: none !important; }
      #dc-root .screen { position: absolute !important; top: 0 !important; left: 0 !important; margin: 0 !important; transform: translate(-26px, -26px) scale(0.965) !important; transform-origin: top left !important; }
    `;
    document.head.appendChild(style);
  }
</script>
</head>
<body>
<x-dc>
<helmet data-dc-atomics>
<meta name="design_doc_mode" content="canvas">
</helmet>

<div class="screen">
  <div aria-hidden="true" style="height:24px;flex:none"></div>
  <div class="content">
    <h1 style="margin:0 4px;font:400 26px Jua,Pretendard;color:#4A3550">설정</h1>

    <div>
      <p style="margin:0 0 8px 6px;font:700 11px Pretendard;color:#A98BE8;letter-spacing:.03em">알림</p>
      <div class="setting-card">
        <button type="button" class="setting-row" onClick="{{openAlarm}}">
          <span class="setting-label">
            <span class="setting-icon" style="background:#FFE3D8"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 7 2 7H4s2-2 2-7z" stroke="#FF8A6B" stroke-width="1.7" stroke-linejoin="round"/><path d="M10 20a2 2 0 0 0 4 0" stroke="#FF8A6B" stroke-width="1.7"/></svg></span>
            <span style="font:600 14px Pretendard">알림 시간</span>
          </span>
          <span style="font:600 13px Pretendard;color:#B08FC0">설정</span>
        </button>
      </div>
    </div>

    <div>
      <p style="margin:0 0 8px 6px;font:700 11px Pretendard;color:#A98BE8;letter-spacing:.03em">보안</p>
      <div class="setting-card">
        <button type="button" class="setting-row" role="switch" aria-checked="{{appLock}}" onClick="{{toggleAppLock}}">
          <span class="setting-label">
            <span class="setting-icon" style="background:#EDE4FA"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="5" y="10" width="14" height="10" rx="3" stroke="#8A76B0" stroke-width="1.7"/><path d="M8 10V8a4 4 0 0 1 8 0v2" stroke="#8A76B0" stroke-width="1.7"/></svg></span>
            <span style="font:600 14px Pretendard">앱 잠금</span>
          </span>
          <span class="switch {{lockClass}}" aria-hidden="true"><span class="switch-knob"></span></span>
        </button>
        <button type="button" class="setting-row" onClick="{{openSafety}}">
          <span class="setting-label">
            <span class="setting-icon" style="background:#E4EAE6"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 3l7 3v6c0 4-3 7-7 9-4-2-7-5-7-9V6z" stroke="#6E9482" stroke-width="1.7" stroke-linejoin="round"/></svg></span>
            <span style="font:600 14px Pretendard">안전 계획 편집</span>
          </span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#C6B4D4" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <div>
      <p style="margin:0 0 8px 6px;font:700 11px Pretendard;color:#A98BE8;letter-spacing:.03em">데이터</p>
      <div class="setting-card">
        <button type="button" class="setting-row" onClick="{{openDeleteConfirm}}">
          <span class="setting-label">
            <span class="setting-icon" style="background:#FBE0E0"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 7h14M9 7V5h6v2M6 7l1 13h10l1-13" stroke="#D64545" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
            <span style="font:600 14px Pretendard;color:#D64545">기록 전체 삭제</span>
          </span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="#E8B0B0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>

    <div style="flex:1"></div>
    <button type="button" onClick="{{openLogoutConfirm}}" style="border:1.5px solid #F0D0D0;background:#fff;width:100%;color:#D64545;font:700 14px Pretendard;padding:12px 0;border-radius:18px;cursor:pointer">로그아웃</button>
  </div>

  <div style="display:flex;justify-content:space-around;align-items:center;padding:10px 14px 6px;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);border-top:1px solid #F0E4F5">
    <a class="nav-item" href="../home/home.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;text-decoration:none;color:inherit"><svg width="24" height="24" viewBox="0 0 24 24" fill="#A98BE8"><path d="M4 11L12 4l8 7v9H4z" opacity=".2"/><path d="M4 11L12 4l8 7M6 10v9h12v-9" stroke="#A98BE8" stroke-width="1.8" fill="none" stroke-linejoin="round"/></svg><span style="font:600 10px Pretendard;color:#A98BE8">홈</span></a>
    <a class="nav-item" href="../record/emotion.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;text-decoration:none;color:inherit"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M6 5h9a2 2 0 0 1 2 2v12H8a2 2 0 0 0-2 2z" stroke="#C6B4D4" stroke-width="1.7" stroke-linejoin="round"/></svg><span style="font:600 10px Pretendard;color:#C6B4D4">기록</span></a>
    <div class="nav-item" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:default"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 6h14a2 2 0 0 1 2 2v7a2 2 0 0 1-2 2h-6l-4 3v-3H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2z" stroke="#C6B4D4" stroke-width="1.7" stroke-linejoin="round"/><circle cx="9" cy="11" r="1.1" fill="#C6B4D4"/><circle cx="12" cy="11" r="1.1" fill="#C6B4D4"/><circle cx="15" cy="11" r="1.1" fill="#C6B4D4"/></svg><span style="font:600 10px Pretendard;color:#C6B4D4">챗봇</span></div>
    <a class="nav-item" href="../safetyplan/home.html" style="display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;text-decoration:none;color:inherit"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 20C5 15 4 9 7.5 7.5S12 9 12 9s1-2.6 4.5-1.5S19 15 12 20z" stroke="#C6B4D4" stroke-width="1.7" stroke-linejoin="round"/></svg><span style="font:600 10px Pretendard;color:#C6B4D4">SOS</span></a>
  </div>
</div>
</x-dc>
</body>
</html>
